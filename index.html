   function kellyFraction(p,b){
   if(b<=0)return 0;
   const f=(b*p-(1-p))/b;
   return Math.max(0,Math.min(f,1));
   }

function clamp(v,lo,hi){return Math.max(lo,Math.min(hi,v))}
function sig(s,th){return s>th?‘bullish’:s<-th?‘bearish’:‘neutral’}

function deriveTradeParams(cs){
const dir=cs>12?‘LONG’:cs<-12?‘SHORT’:‘NEUTRAL’;
const conv=Math.min(Math.abs(cs),100);
let wr,rr;
if(dir===‘LONG’){wr=.44+conv*.003;rr=1.2+conv*.02}
else if(dir===‘SHORT’){wr=.42+conv*.003;rr=1.1+conv*.018}
else{wr=.5;rr=1}
wr=Math.min(wr,.70);rr=Math.min(rr,3.5);
const fk=kellyFraction(wr,rr);
return{direction:dir,conviction:conv,winRate:wr,rr,fullKelly:fk,halfKelly:fk*.5};
}

const C={bg:’#06060c’,card:’#0c0c16’,cb:’#16162a’,g:’#00ff88’,gD:‘rgba(0,255,136,.12)’,r:’#ff3b5c’,rD:‘rgba(255,59,92,.12)’,y:’#f0b90b’,yD:‘rgba(240,185,11,.12)’,t1:’#e4e4e7’,t2:’#71717a’,t3:’#3f3f54’};

function ScoreArc({score,size=180}){
const n=(score+100)/200,a=-135+n*270;
const col=score>20?C.g:score>0?’#6ee7b7’:score>-20?C.y:C.r;
const r=size*.38,cx=size/2,cy=size/2;
const p2c=deg=>{const rd=(deg-90)*Math.PI/180;return{x:cx+r*Math.cos(rd),y:cy+r*Math.sin(rd)}};
const arc=(sa,ea)=>{const s=p2c(ea),e=p2c(sa),l=ea-sa>180?‘1’:‘0’;return`M ${s.x} ${s.y} A ${r} ${r} 0 ${l} 0 ${e.x} ${e.y}`};
const nd=p2c(a);
return(
<svg width={size} height={size} viewBox={`0 0 ${size} ${size}`}>
<defs><filter id="gl"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs>
<path d={arc(-135,135)} fill="none" stroke="#1a1a2e" strokeWidth={size*.055} strokeLinecap="round"/>
<path d={arc(-135,a)} fill="none" stroke={col} strokeWidth={size*.055} strokeLinecap="round" filter="url(#gl)"/>
<circle cx={nd.x} cy={nd.y} r={size*.02} fill={col} filter="url(#gl)"/>
<text x={cx} y={cy-2} textAnchor="middle" fill="#fff" fontSize={size*.19} fontWeight="900">{score>0?’+’:’’}{score.toFixed(0)}</text>
<text x={cx} y={cy+size*.11} textAnchor="middle" fill={C.t2} fontSize={size*.055} letterSpacing="3">COMPOSITE</text>
<text x={size*.13} y={cy+r+16} textAnchor="middle" fill={C.r} fontSize={size*.042}>SHORT</text>
<text x={size*.87} y={cy+r+16} textAnchor="middle" fill={C.g} fontSize={size*.042}>LONG</text>
</svg>
);
}

function Spark({data,color=C.g,w=110,h=28}){
if(!data||data.length<2)return null;
const mn=Math.min(…data),mx=Math.max(…data),rg=mx-mn||1;
const pts=data.map((v,i)=>`${(i/(data.length-1))*w},${h-((v-mn)/rg)*h}`).join(’ ’);
return <svg width={w} height={h}><polyline points={pts} fill="none" stroke={color} strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/></svg>;
}
