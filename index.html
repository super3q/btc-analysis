<!DOCTYPE html>

<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="BTC終端">
<meta name="theme-color" content="#080C14">
<title>BTC 五因子量化終端</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:#080C14;color:#94A3B8;font-family:-apple-system,'SF Pro Display','PingFang TC',sans-serif;overscroll-behavior:none}
::-webkit-scrollbar{width:0;height:0}
a{color:inherit;text-decoration:none}
button{font-family:inherit;cursor:pointer;border:none;background:none;padding:0}
input{font-family:inherit}

/* Layout */
#app{max-width:520px;margin:0 auto;min-height:100dvh;position:relative;background:#080C14}
#header{position:sticky;top:0;z-index:100;background:rgba(8,12,20,.96);backdrop-filter:blur(12px);border-bottom:1px solid rgba(255,255,255,.06);padding:8px 14px 6px;display:flex;justify-content:space-between;align-items:center}
#screen{min-height:calc(100dvh - 110px);overflow-y:auto;padding:0 12px 80px}
#nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:520px;background:rgba(8,12,20,.97);border-top:1px solid rgba(255,255,255,.06);display:flex;height:56px;z-index:200;backdrop-filter:blur(20px)}

/* Nav buttons */
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;border:none;background:none;cursor:pointer;padding:6px 0}
.nav-btn .nav-icon{font-size:20px;line-height:1}
.nav-btn .nav-label{font-size:9px;font-weight:400;color:#64748B}
.nav-btn.active .nav-label{color:#00D4BC;font-weight:700}
.nav-btn .nav-dot{width:20px;height:2px;border-radius:1px;background:#00D4BC;display:none}
.nav-btn.active .nav-dot{display:block}

/* Cards */
.card{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);border-radius:12px;padding:12px 14px;margin-bottom:10px}
.card-title{font-size:10px;color:#64748B;letter-spacing:1.5px;margin-bottom:8px;text-transform:uppercase}
.topbar{position:sticky;top:0;z-index:50;background:#080C14;border-bottom:1px solid rgba(255,255,255,.06);padding:11px 14px 9px;display:flex;justify-content:space-between;align-items:center;margin:0 -12px}

/* Factor bar */
.factor-row{border-left:3px solid #64748B;padding:8px 10px;margin-bottom:6px;background:rgba(255,255,255,.02);border-radius:0 8px 8px 0}
.factor-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:2px}
.pill{font-size:10px;font-weight:700;padding:2px 8px;border-radius:4px}

/* Alert boxes */
.alert{border-radius:8px;padding:8px 12px;margin-bottom:6px;font-size:12px;display:flex;align-items:center;gap:8px}
.alert-danger{background:rgba(239,68,68,.12);border:1px solid rgba(239,68,68,.35);color:#FCA5A5}
.alert-warning{background:rgba(245,158,11,.12);border:1px solid rgba(245,158,11,.35);color:#FDE68A}
.alert-ok{background:rgba(16,185,129,.12);border:1px solid rgba(16,185,129,.35);color:#6EE7B7}

/* Grid helpers */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}

/* Settings overlay */
#settings-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:300;backdrop-filter:blur(4px);overflow-y:auto;padding:40px 12px 40px}
#settings-overlay.open{display:block}
#settings-panel{background:#0F1629;border:1px solid rgba(255,255,255,.1);border-radius:14px;width:100%;max-width:480px;margin:0 auto;padding:20px 16px}
.s-label{font-size:10px;color:#6366F1;font-weight:600;letter-spacing:1px;margin-bottom:8px;border-bottom:1px solid rgba(99,102,241,.2);padding-bottom:4px;margin-top:14px}
.s-input{width:100%;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:6px;padding:7px 9px;color:#F1F5F9;font-size:13px;font-family:monospace;outline:none}
.s-input:focus{border-color:rgba(99,102,241,.5)}
.sig-btn{padding:4px 12px;border-radius:4px;font-size:11px;font-weight:600;cursor:pointer;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.03);color:#64748B}
.sig-btn.sel-bull{background:rgba(16,185,129,.15);border-color:rgba(16,185,129,.4);color:#10B981}
.sig-btn.sel-bear{background:rgba(239,68,68,.15);border-color:rgba(239,68,68,.4);color:#EF4444}
.sig-btn.sel-neutral{background:rgba(245,158,11,.15);border-color:rgba(245,158,11,.4);color:#F59E0B}

/* Order card */
.order-card{border-left:3px solid;border-radius:10px;padding:11px 14px;margin-bottom:8px;border-top:1px solid;border-right:1px solid;border-bottom:1px solid}

/* Tab buttons */
.tab-btn{padding:5px 12px;border-radius:6px;font-size:11px;white-space:nowrap;cursor:pointer;border:1px solid rgba(255,255,255,.07);background:transparent;color:#64748B}
.tab-btn.active{background:rgba(99,102,241,.15);border-color:#6366F1;color:#A5B4FC;font-weight:700}

/* Position map */
.posbar{position:relative;height:36px;background:rgba(255,255,255,.04);border-radius:6px;margin-bottom:40px;overflow:visible}

/* OB bar */
.ob-bar{height:16px;background:rgba(255,255,255,.06);border-radius:8px;overflow:hidden;display:flex;margin-bottom:6px}

@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes glow{0%,100%{box-shadow:0 0 4px currentColor}50%{box-shadow:0 0 12px currentColor}}
.near-pulse{animation:pulse 1s infinite}
</style>

</head>
<body>
<div id="app">
  <div id="header">
    <div>
      <div style="font-size:9px;color:#64748B;letter-spacing:2px">BTC 五因子量化終端</div>
      <div id="hdr-price" style="font-size:26px;font-weight:800;font-family:monospace;line-height:1.2;color:#10B981">連線中...</div>
      <div id="hdr-change" style="font-size:11px;font-family:monospace"></div>
    </div>
    <div style="text-align:right">
      <div style="font-size:10px;display:flex;align-items:center;gap:4px;justify-content:flex-end">
        <span id="ws-dot" style="width:7px;height:7px;border-radius:50%;background:#EF4444;display:inline-block"></span>
        <span id="ws-label" style="color:#EF4444">離線</span>
      </div>
      <div id="rest-time" style="font-size:9px;color:#64748B;margin-top:2px"></div>
      <button onclick="openSettings()" style="margin-top:4px;background:rgba(99,102,241,.12);border:1px solid rgba(99,102,241,.25);color:#A5B4FC;padding:4px 10px;border-radius:6px;font-size:11px">⚙</button>
    </div>
  </div>

  <div id="screen"></div>

  <div id="nav">
    <button class="nav-btn active" data-page="overview" onclick="goPage('overview',this)">
      <span class="nav-icon">⊙</span><span class="nav-label">總覽</span><div class="nav-dot"></div>
    </button>
    <button class="nav-btn" data-page="chart" onclick="goPage('chart',this)">
      <span class="nav-icon">📈</span><span class="nav-label">圖表</span><div class="nav-dot"></div>
    </button>
    <button class="nav-btn" data-page="whale" onclick="goPage('whale',this)">
      <span class="nav-icon">🐋</span><span class="nav-label">籌碼</span><div class="nav-dot"></div>
    </button>
    <button class="nav-btn" data-page="position" onclick="goPage('position',this)">
      <span class="nav-icon">🎯</span><span class="nav-label">倉位</span><div class="nav-dot"></div>
    </button>
    <button class="nav-btn" data-page="orders" onclick="goPage('orders',this)">
      <span class="nav-icon">📋</span><span class="nav-label">掛單</span><div class="nav-dot"></div>
    </button>
  </div>
</div>

<!-- Settings Overlay -->

<div id="settings-overlay" onclick="if(event.target===this)closeSettings()">
<div id="settings-panel">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
    <div style="font-size:15px;font-weight:700;color:#F1F5F9">⚙ 倉位與因子設定</div>
    <button onclick="closeSettings()" style="color:#64748B;font-size:22px;line-height:1">✕</button>
  </div>
  <div class="s-label">空單倉位</div>
  <div class="g2" style="margin-bottom:8px">
    <div><div style="font-size:10px;color:#64748B;margin-bottom:3px">入場價</div><input class="s-input" id="s_entry" type="number"></div>
    <div><div style="font-size:10px;color:#64748B;margin-bottom:3px">持倉量(USDT)</div><input class="s-input" id="s_size" type="number"></div>
  </div>
  <div class="g3" style="margin-bottom:8px">
    <div><div style="font-size:10px;color:#64748B;margin-bottom:3px">止盈</div><input class="s-input" id="s_tp" type="number"></div>
    <div><div style="font-size:10px;color:#64748B;margin-bottom:3px">止損</div><input class="s-input" id="s_sl" type="number"></div>
    <div><div style="font-size:10px;color:#64748B;margin-bottom:3px">槓桿</div><input class="s-input" id="s_lev" type="number"></div>
  </div>
  <div class="s-label">手動因子信號</div>
  <div id="s-factors"></div>
  <button onclick="saveSettings()" style="width:100%;padding:11px;border-radius:8px;border:none;background:linear-gradient(135deg,#6366F1,#8B5CF6);color:#fff;font-size:14px;font-weight:600;cursor:pointer;margin-top:8px">💾 儲存並套用</button>
  <button onclick="resetSettings()" style="width:100%;padding:8px;border-radius:8px;margin-top:6px;border:1px solid rgba(239,68,68,.3);background:transparent;color:#FCA5A5;font-size:12px;cursor:pointer">重置為預設值</button>
</div>
</div>

<script>
// ════════════════════════════════════════════
//  ⚙️  修改區 — 截圖後更新這裡
// ════════════════════════════════════════════
// 📸 更新：2026-03-09 07:44
const DEFAULTS = {
  entry:67762.85, size:3379.6, lev:5, liquidation:85761.37,
  tp:66200, sl:72500,
  addShort:68500, flipLong:65500, longTP:69500, longSL:64000,
  f2sig:"中性", f3sig:"偏空", f5sig:"偏多",
  f2note:"ETF: 需追蹤 bitbo.io/treasuries/etf-flows",
  f3note:"美伊衝突持續，油價上漲，美元走強。",
  f5note:"鯨魚30天累積270K BTC。交易所儲備創6年新低。",
};

const ALL_ORDERS = [
  {type:"限價止盈",dir:"開空",price:68500,  size:959,    trigger:"≥68,500",  date:"03-09 17:47"},
  {type:"限價止盈",dir:"開空",price:72500,  size:4930,   trigger:"≥72,500",  date:"03-07 23:02"},
  {type:"限價止盈",dir:"開空",price:74200,  size:7494.2, trigger:"≥74,200",  date:"03-07 10:58"},
  {type:"限價止盈",dir:"平空",price:66200,  size:1191.6, trigger:"≤66,200",  date:"03-09 14:57",reduceOnly:true},
  {type:"止盈止損",dir:"平空",price:72500,  size:9932.5, trigger:"≥72,500",  date:"03-07 20:54",reduceOnly:true},
  {type:"限價止盈",dir:"開多",price:65500,  size:2489,   trigger:"≤65,500",  date:"03-09 06:22"},
  {type:"限價止盈",dir:"開多",price:65808,  size:987.2,  trigger:"≤65,800",  date:"03-09 08:29"},
  {type:"限價止盈",dir:"開多",price:65010,  size:975.2,  trigger:"≤65,010",  date:"03-09 06:26"},
  {type:"限價止盈",dir:"平多",price:69500,  size:9938.5, trigger:"≥69,500",  date:"03-07 21:02",reduceOnly:true},
  {type:"止盈止損",dir:"平多",price:64000,  size:9984,   trigger:"≤64,000",  date:"03-07 20:54",reduceOnly:true},
];
// ════════════════════════════════════════════

// ── State ────────────────────────────────────
let POS = {...DEFAULTS};
try{ const s=localStorage.getItem("btc5"); if(s) POS={...DEFAULTS,...JSON.parse(s)}; }catch(e){}

const MKT = {price:null,change24h:null,vol24h:null,rsi14:null,atr14:null,ma50:null,ma200:null,fundingRate:null,oi:null,fearGreed:null,wsOk:false,lastRest:null};
let OB   = {buyPct:50,sellPct:50,bid:null,ask:null};
let PIVOTS = {};
let DERIBIT= {pcr:null,status:"讀取中...",col:"#64748B"};
let FUNDING= {rate:null,rateCol:"#F1F5F9",status:"加載中...",statusCol:"#64748B",countdown:"--:--:--",history:[]};
let currentPage = "overview";
let fundingTimer = null;

// ── Helpers ──────────────────────────────────
const $ = id => document.getElementById(id);
const C = {green:"#10B981",red:"#EF4444",yellow:"#F59E0B",blue:"#6366F1",muted:"#64748B",text:"#94A3B8",white:"#F1F5F9",teal:"#00D4BC"};
const fmt = n => { if(n==null) return "---"; if(n>1000) return n.toFixed(2); if(n>1) return n.toFixed(4); if(Math.abs(n)<0.0001) return n.toFixed(8); return n.toFixed(6); };
const pc = (v,mn,mx) => Math.max(0,Math.min(100,(v-mn)/(mx-mn)*100));
const dirCol = d => (d==="開空"||d==="平多") ? C.red : C.green;
const sigCol = s => s&&s.includes("偏多")?C.green:s&&s.includes("偏空")?C.red:s&&s.includes("載入")?C.muted:C.yellow;
const pill = (sig) => `<span class="pill" style="color:${sigCol(sig)};background:${sigCol(sig)}18">${sig||"—"}</span>`;

// ── WebSocket ─────────────────────────────────
function connectWS(){
  try{
    const ws=new WebSocket("wss://stream.binance.com:9443/ws/btcusdt@ticker");
    ws.onopen=()=>{MKT.wsOk=true;updateHeader()};
    ws.onmessage=e=>{const d=JSON.parse(e.data);MKT.price=parseFloat(d.c);MKT.change24h=parseFloat(d.P);MKT.vol24h=parseFloat(d.q);updateHeader();renderPage()};
    ws.onerror=ws.onclose=()=>{MKT.wsOk=false;updateHeader();setTimeout(connectWS,5000)};
  }catch(e){setTimeout(connectWS,10000)}
}

// ── REST ──────────────────────────────────────
async function fetchREST(){
  try{
    const r=await fetch("https://api.binance.com/api/v3/klines?symbol=BTCUSDT&interval=1d&limit=201");
    const k=await r.json();
    if(Array.isArray(k)&&k.length>50){
      const c=k.map(x=>+x[4]);
      let g=0,l=0;
      for(let i=1;i<=14;i++){const d=c[c.length-15+i]-c[c.length-15+i-1];if(d>0)g+=d;else l-=d}
      const ag=g/14,al=l/14;
      MKT.rsi14=al===0?100:100-100/(1+ag/al);
      let atrSum=0;
      for(let i=k.length-14;i<k.length;i++){const h=+k[i][2],lo=+k[i][3],pc2=+k[i-1][4];atrSum+=Math.max(h-lo,Math.abs(h-pc2),Math.abs(lo-pc2))}
      MKT.atr14=atrSum/14;
      MKT.ma50=c.slice(-50).reduce((a,b)=>a+b,0)/50;
      if(c.length>=200)MKT.ma200=c.slice(-200).reduce((a,b)=>a+b,0)/200;
      MKT.lastRest=new Date();
    }
  }catch(e){}
  try{const r=await fetch("https://fapi.binance.com/fapi/v1/fundingRate?symbol=BTCUSDT&limit=1");const d=await r.json();if(Array.isArray(d)&&d[0])MKT.fundingRate=parseFloat(d[0].fundingRate)}catch(e){}
  try{const r=await fetch("https://fapi.binance.com/fapi/v1/openInterest?symbol=BTCUSDT");const d=await r.json();if(d.openInterest)MKT.oi=parseFloat(d.openInterest)}catch(e){}
  try{const r=await fetch("https://api.alternative.me/fng/?limit=1");const d=await r.json();if(d?.data?.[0])MKT.fearGreed=parseInt(d.data[0].value)}catch(e){}
  updateHeader();renderPage();
}

async function fetchWhale(){
  try{
    const r=await fetch("https://fapi.binance.com/fapi/v1/depth?symbol=BTCUSDT&limit=500");
    const d=await r.json();
    let b=d.bids.slice(0,50).reduce((a,v)=>a+parseFloat(v[1]),0);
    let s=d.asks.slice(0,50).reduce((a,v)=>a+parseFloat(v[1]),0);
    const t=b+s;
    let mB={price:0,vol:0},mA={price:0,vol:0};
    d.bids.forEach(v=>{const vol=parseFloat(v[1]);if(vol>mB.vol)mB={price:parseFloat(v[0]),vol}});
    d.asks.forEach(v=>{const vol=parseFloat(v[1]);if(vol>mA.vol)mA={price:parseFloat(v[0]),vol}});
    OB={buyPct:b/t*100,sellPct:s/t*100,bid:mB,ask:mA};
  }catch(e){}
  try{
    const r=await fetch("https://fapi.binance.com/fapi/v1/klines?symbol=BTCUSDT&interval=4h&limit=150");
    const d=await r.json();
    const ph=parseFloat(d[d.length-2][2]),pl=parseFloat(d[d.length-2][3]),pcc=parseFloat(d[d.length-2][4]);
    const pp=(ph+pl+pcc)/3;
    PIVOTS={p:pp,r1:2*pp-pl,r2:pp+(ph-pl),s1:2*pp-ph,s2:pp-(ph-pl)};
  }catch(e){}
  try{
    const r=await fetch("https://deribit.com/api/v2/public/get_book_summary_by_currency?currency=BTC&kind=option");
    const d=await r.json();
    if(d?.result){
      let cOI=0,pOI=0;
      d.result.forEach(i=>{if(i.instrument_name.includes("-C"))cOI+=i.open_interest;if(i.instrument_name.includes("-P"))pOI+=i.open_interest});
      if(cOI>0){
        const p=pOI/cOI;
        DERIBIT={pcr:p.toFixed(2),status:p>1?"🐻 極度看空(軋空燃料)":p<0.6?"🐂 極度貪婪(下殺燃料)":"⚖️ 多空平衡",col:p>1?C.green:p<0.6?C.red:C.yellow};
      }
    }
  }catch(e){}
  try{
    const r=await fetch("https://fapi.binance.com/fapi/v1/premiumIndex?symbol=BTCUSDT");
    const d=await r.json();
    const rate=parseFloat(d.lastFundingRate)*100;
    const rateCol=rate>0.015?C.red:rate<0?C.green:C.yellow;
    const status=rate>0.015?"🔥 極度貪婪":rate<0?"😨 恐慌負費率":"⚖️ 中性";
    const nt=parseInt(d.nextFundingTime);
    if(fundingTimer)clearInterval(fundingTimer);
    fundingTimer=setInterval(()=>{
      const diff=nt-Date.now();
      if(diff>0){const h=Math.floor(diff/3600000),m=Math.floor((diff%3600000)/60000),s=Math.floor((diff%60000)/1000);
      FUNDING.countdown=`下次: ${String(h).padStart(2,"0")}:${String(m).padStart(2,"0")}:${String(s).padStart(2,"0")}`;
      if(currentPage==="whale")renderPage();}
    },1000);
    const hr=await fetch("https://fapi.binance.com/fapi/v1/fundingRate?symbol=BTCUSDT&limit=3");
    const hd=await hr.json();
    const history=hd.reverse().map(x=>{
      const rv=(parseFloat(x.fundingRate)*100).toFixed(4);
      return{time:new Date(x.fundingTime).toLocaleString("zh-TW",{month:"numeric",day:"numeric",hour:"2-digit",minute:"2-digit"}),rate:rv+"%",col:rv>0.015?C.red:rv<0?C.green:C.yellow};
    });
    FUNDING={rate:rate.toFixed(4)+"%",rateCol,status,statusCol:rateCol,countdown:FUNDING.countdown,history};
  }catch(e){}
  if(currentPage==="whale")renderPage();
}

// ── Header update ─────────────────────────────
function updateHeader(){
  const p=MKT.price,ch=MKT.change24h;
  if(p){
    $("hdr-price").textContent="$"+p.toLocaleString(undefined,{maximumFractionDigits:0});
    $("hdr-price").style.color=ch<0?C.red:C.green;
    if(ch!=null){$("hdr-change").textContent=(ch>=0?"+":"")+ch.toFixed(2)+"%";$("hdr-change").style.color=ch>=0?C.green:C.red}
  }
  const dot=$("ws-dot"),lbl=$("ws-label");
  dot.style.background=MKT.wsOk?C.green:C.red;
  dot.style.boxShadow=MKT.wsOk?`0 0 6px ${C.green}88`:"none";
  lbl.textContent=MKT.wsOk?"即時":"離線";
  lbl.style.color=MKT.wsOk?C.green:C.red;
  if(MKT.lastRest)$("rest-time").textContent="REST: "+MKT.lastRest.toLocaleTimeString();
}

// ── Navigation ────────────────────────────────
function goPage(page,btn){
  currentPage=page;
  document.querySelectorAll(".nav-btn").forEach(b=>{b.classList.remove("active")});
  btn.classList.add("active");
  renderPage();
}
function renderPage(){
  const s=$("screen");
  switch(currentPage){
    case "overview":  s.innerHTML=renderOverview(); break;
    case "chart":     s.innerHTML=renderChart(); break;
    case "whale":     s.innerHTML=renderWhale(); break;
    case "position":  s.innerHTML=renderPosition(); break;
    case "orders":    s.innerHTML=renderOrders(); break;
  }
}

// ════════ PAGE: 總覽 ════════
function getFactors(){
  const ch=MKT.change24h,fr=MKT.fundingRate;
  return[

function renderOverview(){
  const p=MKT.price;
  const fs=getFactors();
  const bear=fs.filter(f=>f.sig?.includes("偏空")).length;
  const bull=fs.filter(f=>f.sig?.includes("偏多")).length;
  const oc=bear>bull?C.red:bull>bear?C.green:C.yellow;
  const ot=bear>bull?"偏空":bull>bear?"偏多":"中性";

  // PnL
  let pnlHtml="";
  if(p){
    const pct=((POS.entry-p)/POS.entry*100*POS.lev).toFixed(2);
    const u=((POS.entry-p)/POS.entry*POS.size).toFixed(2);
    const pos2=pct>0;
    pnlHtml=`<div style="border-radius:12px;padding:12px 14px;margin:12px 0 10px;display:flex;justify-content:space-between;align-items:center;background:${pos2?"rgba(16,185,129,.08)":"rgba(239,68,68,.08)"};border:1px solid ${pos2?C.green:C.red}33">
      <div><div style="font-size:10px;color:#64748B">空單@$${POS.entry.toLocaleString()}·${POS.lev}X</div>
      <div style="font-size:22px;font-weight:800;color:${pos2?C.green:C.red};font-family:monospace">${pct>0?"+":""}${pct}%</div></div>
      <div style="text-align:right"><div style="font-size:10px;color:#64748B">浮盈</div>
      <div style="font-size:16px;font-weight:700;color:${pos2?C.green:C.red};font-family:monospace">${u>0?"+":""}${u}U</div></div>
    </div>`;
  }

  // Alerts
  let alerts="";
  if(p){
    if(p>=POS.sl-300) alerts+=`<div class="alert alert-danger">🚨 接近止損 $${POS.sl.toLocaleString()}！距 $${(POS.sl-p).toFixed(0)}</div>`;
    if(p<=POS.tp+500&&p>POS.tp) alerts+=`<div class="alert alert-warning">⚠️ 接近止盈 $${POS.tp.toLocaleString()}</div>`;
    if(p<=POS.tp) alerts+=`<div class="alert alert-ok">✅ 已達止盈區！</div>`;
    if(MKT.rsi14!=null&&MKT.rsi14<30) alerts+=`<div class="alert alert-warning">⚠️ RSI ${MKT.rsi14.toFixed(1)} 超賣</div>`;
    if(MKT.fundingRate!=null&&MKT.fundingRate<-0.01) alerts+=`<div class="alert alert-danger">🚨 費率極負 軋空風險</div>`;
  }

  // Factors
  const fHtml=fs.map(f=>`
    <div class="factor-row" style="border-left-color:${sigCol(f.sig)}">
      <div class="factor-head"><span style="font-size:10px;color:#64748B">因子${f.num}·${f.title}</span>${pill(f.sig)}</div>
      <div style="font-size:16px;font-weight:700;color:#F1F5F9;font-family:monospace">${f.val}</div>
      ${f.det?`<div style="font-size:10px;color:#94A3B8;margin-top:2px;line-height:1.4">${f.det}</div>`:""}
    </div>`).join("");

  // Contra
  const cs=[
    {l:"F&G<20",met:MKT.fearGreed!=null?MKT.fearGreed<20:null,v:MKT.fearGreed??"—"},
    {l:"RSI<30",met:MKT.rsi14!=null?MKT.rsi14<30:null,v:MKT.rsi14?MKT.rsi14.toFixed(1):"—"},
    {l:"費率負",met:MKT.fundingRate!=null?MKT.fundingRate<0:null,v:MKT.fundingRate!=null?(MKT.fundingRate*100).toFixed(4)+"%":"—"},
    {l:"鯨魚累積",met:POS.f5sig==="偏多",v:POS.f5sig==="偏多"?"是":"否"},
  ];
  const cw=cs.filter(c=>c.met===true).length>=3;
  const cHtml=cs.map(c=>`<div style="font-size:11px;color:#CBD5E1;display:flex;align-items:center;gap:6px"><span>${c.met===true?"✅":c.met===false?"❌":"❓"}</span><span>${c.l}: <span style="font-family:monospace;color:#F1F5F9">${c.v}</span></span></div>`).join("");

  // Tech
  const tech=[
    {l:"RSI(14)",v:MKT.rsi14?MKT.rsi14.toFixed(1):"—",w:MKT.rsi14&&MKT.rsi14<30},
    {l:"ATR(14)",v:MKT.atr14?"$"+MKT.atr14.toFixed(0):"—"},
    {l:"MA50",v:MKT.ma50?"$"+(MKT.ma50/1000).toFixed(1)+"K":"—"},
    {l:"MA200",v:MKT.ma200?"$"+(MKT.ma200/1000).toFixed(1)+"K":"—"},
    {l:"OI",v:MKT.oi?(MKT.oi/1000).toFixed(1)+"K":"—"},
    {l:"Vol 24h",v:MKT.vol24h?"$"+(MKT.vol24h/1e9).toFixed(2)+"B":"—"},
  ].map(i=>`<div><div style="font-size:9px;color:#64748B">${i.l}</div><div style="font-size:14px;font-weight:700;color:${i.w?C.red:"#F1F5F9"};font-family:monospace">${i.v}</div></div>`).join("");

  // Kelly
  const rw=POS.entry-POS.tp,rk=POS.sl-POS.entry,b=rw/rk;
  const k1=(b*.4-(1-.4))/b,k2=(b*.3-(1-.3))/b;
  const kellyHtml=[[k1,"樂觀40%"],[k2,"保守30%"]].map(([k,l])=>`<div>
    <div style="font-size:10px;color:#94A3B8">${l}</div>
    <div style="font-size:18px;font-weight:800;color:${k>0?C.green:C.red};font-family:monospace">${k>0?(k*100).toFixed(1)+"%":"不下注"}</div>
    <div style="font-size:10px;color:#64748B">R/R=${b.toFixed(2)}:1</div>
  </div>`).join("");

  return `
    ${pnlHtml}
    ${alerts}
    <div style="border-radius:10px;padding:10px 14px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center;background:${oc}10;border:1px solid ${oc}33">
      <span style="font-size:12px;color:#94A3B8">五因子綜合信號</span>
      <span style="font-size:14px;font-weight:700;color:${oc}">${ot} (${bear}空/${bull}多)</span>
    </div>
    <div class="card"><div class="card-title">五大因子</div>${fHtml}</div>
    <div style="border-radius:10px;padding:12px 14px;margin-bottom:10px;background:${cw?"rgba(239,68,68,.08)":"rgba(255,255,255,.03)"};border:1px solid ${cw?C.red+"55":"rgba(255,255,255,.06)"}">
      <div style="font-size:11px;font-weight:700;color:${cw?"#FCA5A5":"#64748B"};margin-bottom:8px">${cw?"🚨 逆向警報：做空對抗統計":"📊 逆向檢查"}</div>
      <div class="g2" style="gap:6px">${cHtml}</div>
      ${cw?`<div style="font-size:10px;color:#FCA5A5;margin-top:8px">K33：90天做多勝率78%</div>`:""}
    </div>
    <div class="card"><div class="card-title">技術指標</div><div class="g3" style="gap:10px">${tech}</div></div>
    <div class="card"><div class="card-title">凱利公式速算</div><div class="g2" style="gap:10px">${kellyHtml}</div></div>
  `;
}

      <div class="card-title">掛單價格梯度</div>
      <div style="position:relative;height:28px;background:rgba(255,255,255,.03);border-radius:6px;margin-bottom:26px">
        <div style="position:absolute;left:${pct2(p)}%;top:0;bottom:0;width:2px;background:#F1F5F9;border-radius:1px"></div>
        <div style="position:absolute;left:${pct2(p)}%;top:-18px;transform:translateX(-50%);font-size:9px;font-weight:700;color:#F1F5F9;white-space:nowrap;font-family:monospace">NOW $${p.toLocaleString(undefined,{maximumFractionDigits:0})}</div>
        ${dots}
      </div>
    </div>`;
  }

  // PnL badge
  const pnlBadge=p?`<span style="font-size:12px;font-weight:700;color:${p<POS.entry?C.green:C.red};font-family:monospace">${((POS.entry-p)/POS.entry*100*POS.lev).toFixed(2)}%</span>`:"";

  const orderCards=sorted.map(o=>{
    const d=p?((o.price-p)/p*100):null;
    const near=p&&Math.abs((o.price-p)/p)<0.02;
    const dc=dirCol(o.dir);
    return`<div class="order-card" style="border-color:${near?dc+"55":"rgba(255,255,255,.06)"};border-left-color:${dc};background:${near?dc+"10":"rgba(255,255,255,.03)"}">
      ${near?`<div style="font-size:9px;color:${dc};font-weight:700;margin-bottom:4px;display:flex;align-items:center;gap:4px"><span style="width:6px;height:6px;border-radius:50%;background:${dc};display:inline-block;animation:pulse 1s infinite"></span>⚡ 接近觸發！${d?.toFixed(2)}%</div>`:""}
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
        <div style="display:flex;align-items:center;gap:6px">
          <span style="font-size:10px;font-weight:700;padding:2px 7px;border-radius:4px;color:${dc};background:${dc}12">${o.dir}</span>
          <span style="font-size:10px;color:#64748B">${o.type}</span>
          ${o.reduceOnly?`<span style="font-size:9px;color:#A855F7;background:rgba(168,85,247,.12);padding:1px 6px;border-radius:4px">只減倉</span>`:""}
        </div>
        <span style="font-size:9px;color:#64748B;font-family:monospace">2026-${o.date}</span>
      </div>
      <div class="g3">
        <div><div style="font-size:9px;color:#64748B">價格</div><div style="font-size:15px;font-weight:800;color:#F1F5F9;font-family:monospace">$${o.price.toLocaleString()}</div></div>
        <div><div style="font-size:9px;color:#64748B">數量(U)</div><div style="font-size:14px;font-weight:700;color:#94A3B8;font-family:monospace">${o.size.toLocaleString()}</div></div>
        <div><div style="font-size:9px;color:#64748B">距現價</div><div style="font-size:14px;font-weight:700;color:${d==null?C.muted:d>0?C.red:C.green};font-family:monospace">${d!=null?(d>0?"+":"")+d.toFixed(2)+"%":"—"}</div></div>
      </div>
      <div style="margin-top:6px;font-size:10px;color:#64748B">觸發：<span style="color:#94A3B8;font-family:monospace">${o.trigger}</span></div>
    </div>`;
  }).join("");

  return `
    <div class="topbar"><div>
      <div style="font-size:15px;font-weight:800;color:#F1F5F9">條件單總覽</div>
      <div style="font-size:10px;color:#64748B">📸 2026-03-09 07:44 · 共${ALL_ORDERS.length}筆</div>
    </div></div>
    <div style="height:12px"></div>
    <div style="background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.25);border-radius:12px;padding:12px 14px;margin-bottom:12px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
        <div style="display:flex;align-items:center;gap:8px">
          <span style="background:${C.red};color:#fff;font-size:10px;font-weight:800;padding:2px 8px;border-radius:4px">空</span>
          <span style="font-size:13px;font-weight:700;color:#F1F5F9">BTCUSDT 永續 · 全倉 5X</span>
        </div>
        ${pnlBadge}
      </div>
      <div class="g3">
        <div style="background:rgba(0,0,0,.25);border-radius:8px;padding:7px 10px"><div style="font-size:9px;color:#64748B">開倉均價</div><div style="font-size:13px;font-weight:700;color:${C.yellow};font-family:monospace">$${POS.entry.toLocaleString()}</div></div>
        <div style="background:rgba(0,0,0,.25);border-radius:8px;padding:7px 10px"><div style="font-size:9px;color:#64748B">持倉</div><div style="font-size:13px;font-weight:700;color:#F1F5F9;font-family:monospace">${POS.size} U</div></div>
        <div style="background:rgba(0,0,0,.25);border-radius:8px;padding:7px 10px"><div style="font-size:9px;color:#64748B">強平</div><div style="font-size:13px;font-weight:700;color:${C.red};font-family:monospace">$${(POS.liquidation||85761).toLocaleString()}</div></div>
      </div>
    </div>
    <div style="display:flex;gap:5px;margin-bottom:10px;overflow-x:auto;padding-bottom:2px">${filterTabs}</div>
    ${ladderHtml}
    ${orderCards}
    <div style="margin-top:16px;padding:10px 14px;background:rgba(99,102,241,.06);border:1px solid rgba(99,102,241,.2);border-radius:10px;font-size:10px;color:#818CF8;line-height:1.8">
      📸 截圖幣安條件單傳給 Claude → 自動更新 ALL_ORDERS 陣列
    </div>`;
}
function getFiltered(){ return ordFilter==="全部"?ALL_ORDERS:ALL_ORDERS.filter(o=>o.dir===ordFilter); }
function setOrderFilter(f){ ordFilter=f; renderPage(); }

// ════════ SETTINGS ════════
const MF_DEFS=[
  {key:"f2sig",label:"因子2 · ETF資金流",nk:"f2note"},
  {key:"f3sig",label:"因子3 · 地緣政治",nk:"f3note"},
  {key:"f5sig",label:"因子5 · 鏈上行為",nk:"f5note"},
];
function openSettings(){
  $("s_entry").value=POS.entry;$("s_size").value=POS.size;
  $("s_tp").value=POS.tp;$("s_sl").value=POS.sl;$("s_lev").value=POS.lev;
  $("s-factors").innerHTML=MF_DEFS.map(f=>`
    <div style="border-bottom:1px solid rgba(255,255,255,.04);padding-bottom:10px;margin-bottom:10px">
      <div style="font-size:11px;color:#CBD5E1;margin-bottom:6px">${f.label}</div>
      <div style="display:flex;gap:4px;margin-bottom:6px">
        ${["偏空","中性","偏多"].map(sig=>{
          const sel=POS[f.key]===sig;
          const cls=sel?(sig==="偏空"?"sel-bear":sig==="偏多"?"sel-bull":"sel-neutral"):"";
          return`<button class="sig-btn ${cls}" onclick="selSig(this,'${f.key}','${sig}')">${sig}</button>`;
        }).join("")}
      </div>
      <input style="width:100%;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.08);border-radius:4px;padding:4px 8px;color:#94A3B8;font-size:11px;outline:none" id="s_${f.nk}" value="${POS[f.nk]||""}" placeholder="備註...">
    </div>`).join("");
  $("settings-overlay").classList.add("open");
}
function closeSettings(){$("settings-overlay").classList.remove("open")}
function selSig(btn,key,val){
  const par=btn.parentElement;
  par.querySelectorAll(".sig-btn").forEach(b=>{b.className="sig-btn"});
  btn.className="sig-btn "+(val==="偏空"?"sel-bear":val==="偏多"?"sel-bull":"sel-neutral");
  POS[key]=val;
}
function saveSettings(){
  POS.entry=parseFloat($("s_entry").value)||POS.entry;
  POS.size=parseFloat($("s_size").value)||POS.size;
  POS.tp=parseFloat($("s_tp").value)||POS.tp;
  POS.sl=parseFloat($("s_sl").value)||POS.sl;
  POS.lev=parseFloat($("s_lev").value)||POS.lev;
  MF_DEFS.forEach(f=>{const n=$("s_"+f.nk);if(n)POS[f.nk]=n.value});
  try{localStorage.setItem("btc5",JSON.stringify(POS))}catch(e){}
  closeSettings();renderPage();
}
function resetSettings(){
  if(confirm("確定重置？")){Object.assign(POS,DEFAULTS);try{localStorage.removeItem("btc5")}catch(e){}openSettings();}
}

// ── Init ─────────────────────────────────────
document.addEventListener('DOMContentLoaded', function() {
  connectWS();
  fetchREST();
  fetchWhale();
  setInterval(fetchREST,30000);
  setInterval(fetchWhale,60000);
  renderPage();
});
</script>
