<!DOCTYPE html>

<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="BTC AI">
<meta name="theme-color" content="#050810">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
<title>BTC AI 量化顧問</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#050810;--bg2:#080C14;--card:rgba(255,255,255,.03);--bd:rgba(255,255,255,.07);
  --mt:#64748B;--tx:#94A3B8;--wh:#F1F5F9;
  --gr:#10B981;--rd:#EF4444;--yl:#F59E0B;--bl:#6366F1;--pu:#A855F7;
  --tl:#00D4BC;--cy:#06B6D4;
}
html,body{height:100%;background:var(--bg);color:var(--tx);font-family:-apple-system,'SF Pro Display','PingFang TC',sans-serif;overscroll-behavior:none}
.mono{font-family:'JetBrains Mono',monospace}
::-webkit-scrollbar{width:0}
button{font-family:inherit;cursor:pointer;border:none;background:none}
input{font-family:'JetBrains Mono',monospace;box-sizing:border-box}
#app{max-width:520px;margin:0 auto;min-height:100dvh;background:var(--bg)}
#hdr{position:sticky;top:0;z-index:100;background:rgba(5,8,16,.96);backdrop-filter:blur(20px);
  border-bottom:1px solid rgba(99,102,241,.2);padding:8px 14px;
  display:flex;justify-content:space-between;align-items:center}
#screen{min-height:calc(100dvh - 56px - 52px);overflow-y:auto}
.sp{padding:0 12px 80px}
#nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:520px;
  background:rgba(5,8,16,.97);border-top:1px solid rgba(99,102,241,.2);
  display:flex;height:56px;z-index:200;backdrop-filter:blur(20px);
  padding-bottom:env(safe-area-inset-bottom,0)}
.nb{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;padding:6px 0}
.nb .ni{font-size:18px;line-height:1}
.nb .nl{font-size:9px;color:var(--mt);transition:color .2s}
.nb.on .nl{color:var(--tl);font-weight:700}
.nb .nd{width:20px;height:2px;border-radius:1px;background:linear-gradient(90deg,var(--bl),var(--tl));display:none}
.nb.on .nd{display:block}
.card{background:var(--card);border:1px solid var(--bd);border-radius:12px;padding:12px 14px;margin-bottom:10px}
.ct{font-size:10px;color:var(--mt);letter-spacing:1.5px;margin-bottom:8px;text-transform:uppercase}
.tbar{position:sticky;top:0;z-index:50;background:var(--bg);border-bottom:1px solid var(--bd);
  padding:11px 14px 9px;margin:0 -12px;display:flex;justify-content:space-between;align-items:center}
.ai-card{background:linear-gradient(135deg,rgba(99,102,241,.08),rgba(168,85,247,.05));
  border:1px solid rgba(99,102,241,.35);border-radius:14px;padding:14px 16px;margin-bottom:10px;position:relative}
.ai-badge{display:inline-flex;align-items:center;gap:5px;font-size:10px;font-weight:700;
  color:var(--bl);background:rgba(99,102,241,.12);border:1px solid rgba(99,102,241,.3);
  padding:3px 10px;border-radius:20px;margin-bottom:10px;letter-spacing:.5px}
.ai-dot{width:6px;height:6px;border-radius:50%;background:var(--bl);animation:bounce .8s infinite;display:inline-block}
.ai-dot:nth-child(2){animation-delay:.15s}
.ai-dot:nth-child(3){animation-delay:.3s}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
.verdict-card{border-radius:12px;padding:14px 16px;margin-bottom:10px;text-align:center}
.verdict-score{font-size:52px;font-weight:800;font-family:'JetBrains Mono',monospace;line-height:1}
.kelly-big{font-size:32px;font-weight:800;font-family:'JetBrains Mono',monospace}
.chip{display:inline-flex;align-items:center;gap:4px;font-size:10px;padding:3px 8px;border-radius:4px;
  background:rgba(255,255,255,.05);border:1px solid var(--bd);color:var(--mt);margin:2px}
.chip.ok{color:var(--gr);background:rgba(16,185,129,.08);border-color:rgba(16,185,129,.2)}
.chip.err{color:var(--rd);background:rgba(239,68,68,.08);border-color:rgba(239,68,68,.2)}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.pill{font-size:10px;font-weight:700;padding:2px 8px;border-radius:4px}
.alert{border-radius:8px;padding:8px 12px;margin-bottom:6px;font-size:12px;display:flex;align-items:center;gap:8px}
.ad{background:rgba(239,68,68,.12);border:1px solid rgba(239,68,68,.35);color:#FCA5A5}
.aw{background:rgba(245,158,11,.12);border:1px solid rgba(245,158,11,.35);color:#FDE68A}
.ao{background:rgba(16,185,129,.12);border:1px solid rgba(16,185,129,.35);color:#6EE7B7}
.tab{padding:5px 12px;border-radius:6px;font-size:11px;white-space:nowrap;cursor:pointer;
  border:1px solid var(--bd);background:transparent;color:var(--mt)}
.tab.on{background:rgba(99,102,241,.15);border-color:var(--bl);color:#A5B4FC;font-weight:700}
.mbox{background:rgba(255,255,255,.04);border:1px solid var(--bd);border-radius:8px;padding:10px 12px}
.mbox .ml{font-size:10px;color:var(--mt);margin-bottom:3px}
.mbox .mv{font-size:15px;font-weight:700;font-family:'JetBrains Mono',monospace;color:var(--wh)}
#sOverlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:300;
  backdrop-filter:blur(4px);overflow-y:auto;padding:40px 12px}
#sOverlay.open{display:block}
#sPanel{background:#0A0F1E;border:1px solid rgba(99,102,241,.3);border-radius:14px;
  max-width:480px;margin:0 auto;padding:20px 16px}
.sl{font-size:10px;color:var(--bl);font-weight:700;letter-spacing:1px;margin-bottom:8px;
  border-bottom:1px solid rgba(99,102,241,.2);padding-bottom:4px;margin-top:14px}
.fi{width:100%;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);
  border-radius:6px;padding:7px 9px;color:var(--wh);font-size:13px;outline:none}
.fi:focus{border-color:rgba(99,102,241,.5)}
.src-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:10px}
.src-item{background:rgba(255,255,255,.02);border:1px solid var(--bd);border-radius:8px;padding:8px 10px}
.scorebar-track{height:6px;background:rgba(255,255,255,.08);border-radius:3px;overflow:hidden;margin-top:6px}
.scorebar-fill{height:100%;border-radius:3px;transition:width .6s ease}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.anim{animation:fadeIn .25s ease}
</style>
</head>
<body>
<div id="app">
  <div id="hdr">
    <div>
      <div style="font-size:9px;color:var(--bl);letter-spacing:2px;font-weight:600">BTC AI 量化顧問</div>
      <div id="hp" class="mono" style="font-size:24px;font-weight:700;color:var(--gr)">載入中...</div>
      <div id="hc" class="mono" style="font-size:10px"></div>
    </div>
    <div style="text-align:right">
      <div style="font-size:10px;display:flex;align-items:center;gap:4px;justify-content:flex-end">
        <span id="wsd" style="width:7px;height:7px;border-radius:50%;background:var(--rd);display:inline-block"></span>
        <span id="wsl" style="color:var(--rd);font-size:10px">離線</span>
      </div>
      <button onclick="triggerAI()" id="ai-btn" style="margin-top:6px;background:linear-gradient(135deg,#6366F1,#8B5CF6);
        color:#fff;padding:5px 12px;border-radius:20px;font-size:11px;font-weight:700;
        border:none;box-shadow:0 0 16px rgba(99,102,241,.4);display:flex;align-items:center;gap:4px">
        <span>✦</span>AI分析
      </button>
    </div>
  </div>
  <div id="screen"></div>
  <div id="nav">
    <button class="nb on" onclick="goPage('ai',this)"><span class="ni">✦</span><span class="nl">AI分析</span><div class="nd"></div></button>
    <button class="nb" onclick="goPage('data',this)"><span class="ni">📡</span><span class="nl">數據源</span><div class="nd"></div></button>
    <button class="nb" onclick="goPage('macro',this)"><span class="ni">🌐</span><span class="nl">宏觀</span><div class="nd"></div></button>
    <button class="nb" onclick="goPage('kelly',this)"><span class="ni">🎯</span><span class="nl">凱利</span><div class="nd"></div></button>
    <button class="nb" onclick="goPage('arch',this)"><span class="ni">🏗</span><span class="nl">架構</span><div class="nd"></div></button>
  </div>
</div>

<div id="sOverlay" onclick="if(event.target===this)closeSetting()">
<div id="sPanel">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
    <div style="font-size:15px;font-weight:700;color:var(--wh)">設定交易參數</div>
    <button onclick="closeSetting()" style="color:var(--mt);font-size:22px">X</button>
  </div>
  <div class="sl">倉位參數</div>
  <div class="g2" style="margin-bottom:8px">
    <div><div style="font-size:10px;color:var(--mt);margin-bottom:3px">入場價</div><input class="fi" id="s_entry" type="number"></div>
    <div><div style="font-size:10px;color:var(--mt);margin-bottom:3px">槓桿</div><input class="fi" id="s_lev" type="number"></div>
  </div>
  <div class="g2" style="margin-bottom:14px">
    <div><div style="font-size:10px;color:var(--mt);margin-bottom:3px">止盈目標</div><input class="fi" id="s_tp" type="number"></div>
    <div><div style="font-size:10px;color:var(--mt);margin-bottom:3px">止損點</div><input class="fi" id="s_sl" type="number"></div>
  </div>
  <div class="sl">API Key (選填)</div>
  <input class="fi" id="s_apikey" type="password" placeholder="sk-ant-... 留空使用示範模式" style="margin-bottom:14px">
  <button onclick="saveSetting()" style="width:100%;padding:11px;border-radius:8px;border:none;
    background:linear-gradient(135deg,#6366F1,#8B5CF6);color:#fff;font-size:14px;font-weight:600;cursor:pointer">
    儲存
  </button>
</div>
</div>

<script>
// ══════════════════════════════════════════
//  DEFAULTS
// ══════════════════════════════════════════
const DEFAULTS = { entry:67762.85, tp:66200, sl:72500, lev:5, apikey:"" };
let CFG = {...DEFAULTS};
try{const s=localStorage.getItem("btc_ai_cfg");if(s)CFG={...DEFAULTS,...JSON.parse(s)};}catch(e){}

const MKT={price:null,change24h:null,vol24h:null,rsi14:null,atr14:null,ma50:null,ma200:null,fundingRate:null,oi:null,fearGreed:null,fearLabel:null,wsOk:false};
const MACRO={btcDom:null,totalMktCap:null,fg:null,fgLabel:null,fundingRate:null,fundingSign:null,oi:null,loaded:false};
const srcStatus={};
let _page="ai",_ftimer=null,_aiResult=null,_aiLoading=false;

const SOURCES=[
  {id:"binance_ws",   name:"Binance WS",     type:"交易所即時",   tier:"free"},
  {id:"binance_rest", name:"Binance REST",    type:"K線/OI/費率",  tier:"free"},
  {id:"binance_fapi", name:"Binance FAPI",    type:"合約深度/費率",tier:"free"},
  {id:"coingecko",    name:"CoinGecko API",   type:"全域市值/主導率",tier:"free"},
  {id:"alternative",  name:"Alternative.me",  type:"恐懼貪婪指數", tier:"free"},
  {id:"deribit",      name:"Deribit API",     type:"期權PCR",      tier:"free"},
  {id:"messari",      name:"Messari",         type:"鏈上研究報告",  tier:"paid"},
  {id:"glassnode",    name:"Glassnode",       type:"鏈上指標",      tier:"paid"},
  {id:"nansen",       name:"Nansen",          type:"鯨魚追蹤",      tier:"paid"},
  {id:"cryptoquant",  name:"CryptoQuant",     type:"鏈上資金流",    tier:"paid"},
  {id:"coinmarketcap",name:"CoinMarketCap",   type:"市場聚合數據",  tier:"free"},
  {id:"theblock",     name:"The Block",       type:"機構研究",      tier:"paid"},
];
SOURCES.forEach(s=>{srcStatus[s.id]="idle";});

const $=id=>document.getElementById(id);
const C={gr:"#10B981",rd:"#EF4444",yl:"#F59E0B",bl:"#6366F1",pu:"#A855F7",mt:"#64748B",tl:"#00D4BC",cy:"#06B6D4"};
const fmt=n=>{if(n==null)return"---";if(Math.abs(n)>999999)return"$"+(n/1e12).toFixed(2)+"T";if(Math.abs(n)>999)return n.toLocaleString(undefined,{maximumFractionDigits:0});if(Math.abs(n)>1)return n.toFixed(2);return n.toFixed(4);};
const sigC=s=>{if(!s)return C.mt;if(s.includes("強烈偏多")||s.includes("極度貪婪"))return C.gr;if(s.includes("偏多"))return C.tl;if(s.includes("強烈偏空"))return C.rd;if(s.includes("偏空"))return C.rd;return C.yl;};

// ── Header ──────────────────────────────────
function renderHdr(){
  const p=MKT.price,ch=MKT.change24h;
  if(p){$("hp").textContent="$"+p.toLocaleString(undefined,{maximumFractionDigits:0});$("hp").style.color=ch<0?C.rd:C.gr;}
  if(ch!=null){$("hc").textContent=(ch>=0?"+":"")+ch.toFixed(2)+"%";$("hc").style.color=ch>=0?C.gr:C.rd;}
  $("wsd").style.background=MKT.wsOk?C.gr:C.rd;
  $("wsd").style.boxShadow=MKT.wsOk?"0 0 6px "+C.gr+"88":"none";
  $("wsl").textContent=MKT.wsOk?"即時":"離線";
  $("wsl").style.color=MKT.wsOk?C.gr:C.rd;
}

// ── WebSocket ────────────────────────────────
function connectWS(){
  try{
    const ws=new WebSocket("wss://stream.binance.com:9443/ws/btcusdt@ticker");
    ws.onopen=()=>{MKT.wsOk=true;srcStatus.binance_ws="ok";renderHdr();};
    ws.onmessage=e=>{const d=JSON.parse(e.data);MKT.price=parseFloat(d.c);MKT.change24h=parseFloat(d.P);MKT.vol24h=parseFloat(d.q);renderHdr();if(_page==="ai"||_page==="kelly")renderPage();};
    ws.onerror=ws.onclose=()=>{MKT.wsOk=false;srcStatus.binance_ws="err";renderHdr();setTimeout(connectWS,5000);};
  }catch(e){setTimeout(connectWS,10000);}
}

// ── REST fetch ───────────────────────────────
async function fetchAll(){
  // Klines RSI/ATR/MA
  try{
    srcStatus.binance_rest="loading";
    const r=await fetch("https://api.binance.com/api/v3/klines?symbol=BTCUSDT&interval=1d&limit=201");
    const k=await r.json();
    if(Array.isArray(k)&&k.length>50){
      const c=k.map(x=>+x[4]);
      let g=0,l=0;
      for(let i=1;i<=14;i++){const d=c[c.length-15+i]-c[c.length-15+i-1];if(d>0)g+=d;else l-=d;}
      MKT.rsi14=l===0?100:100-100/(1+(g/14)/(l/14));
      let atr=0;for(let i=k.length-14;i<k.length;i++){const h=+k[i][2],lo=+k[i][3],p2=+k[i-1][4];atr+=Math.max(h-lo,Math.abs(h-p2),Math.abs(lo-p2));}
      MKT.atr14=atr/14;
      MKT.ma50=c.slice(-50).reduce((a,b)=>a+b,0)/50;
      if(c.length>=200)MKT.ma200=c.slice(-200).reduce((a,b)=>a+b,0)/200;
    }
    srcStatus.binance_rest="ok";
  }catch(e){srcStatus.binance_rest="err";}

  // Funding
  try{
    srcStatus.binance_fapi="loading";
    const r=await fetch("https://fapi.binance.com/fapi/v1/premiumIndex?symbol=BTCUSDT");
    const d=await r.json();
    MKT.fundingRate=parseFloat(d.lastFundingRate);
    MACRO.fundingRate=(MKT.fundingRate*100).toFixed(4)+"%";
    MACRO.fundingSign=MKT.fundingRate<0?"偏多":MKT.fundingRate>0.01?"偏空":"中性";
    srcStatus.binance_fapi="ok";
  }catch(e){srcStatus.binance_fapi="err";}

  // OI
  try{
    const r=await fetch("https://fapi.binance.com/fapi/v1/openInterest?symbol=BTCUSDT");
    const d=await r.json();
    MKT.oi=parseFloat(d.openInterest);MACRO.oi=MKT.oi;
  }catch(e){}

  // Fear & Greed
  try{
    srcStatus.alternative="loading";
    const r=await fetch("https://api.alternative.me/fng/?limit=1");
    const d=await r.json();
    if(d&&d.data&&d.data[0]){MKT.fearGreed=parseInt(d.data[0].value);MKT.fearLabel=d.data[0].value_classification;MACRO.fg=MKT.fearGreed;MACRO.fgLabel=MKT.fearLabel;}
    srcStatus.alternative="ok";
  }catch(e){srcStatus.alternative="err";}

  // CoinGecko global
  try{
    srcStatus.coingecko="loading";
    const r=await fetch("https://api.coingecko.com/api/v3/global");
    const d=await r.json();
    if(d&&d.data){MACRO.btcDom=d.data.market_cap_percentage&&d.data.market_cap_percentage.btc?d.data.market_cap_percentage.btc.toFixed(1):null;MACRO.totalMktCap=d.data.total_market_cap&&d.data.total_market_cap.usd?d.data.total_market_cap.usd:null;}
    srcStatus.coingecko="ok";
  }catch(e){srcStatus.coingecko="err";}

  MACRO.loaded=true;
  if(_page==="macro"||_page==="data"||_page==="kelly")renderPage();
}

// ══════════════════════════════════════════
//  AI ENGINE
// ══════════════════════════════════════════
function buildPrompt(){
  const p=MKT.price||67000,ch=MKT.change24h||0;
  const fr=MKT.fundingRate||0,rsi=MKT.rsi14||50;
  const ma50=MKT.ma50||65000,ma200=MKT.ma200||60000;
  const fg=MKT.fearGreed||30,btcDom=MACRO.btcDom||50,oi=MKT.oi||300000;
  const rw=Math.abs(CFG.entry-CFG.tp),rk=Math.abs(CFG.sl-CFG.entry),br=rw/rk;
  const winEst=rsi<40?0.55:rsi>65?0.40:0.50;
  const kelly=((br*winEst-(1-winEst))/br*100).toFixed(1);
  const pnl=MKT.price?((CFG.entry-MKT.price)/CFG.entry*100*CFG.lev).toFixed(2):"N/A";

  return `你是一位加密貨幣量化交易分析師，請基於以下即時市場數據提供中文分析建議。

即時數據（${new Date().toLocaleString("zh-TW")}）：
BTC價格: $${p.toLocaleString()}, 24h: ${ch>=0?"+":""}${ch.toFixed(2)}%
RSI(14): ${rsi.toFixed(1)}, MA50: $${(ma50/1000).toFixed(1)}K, MA200: $${(ma200/1000).toFixed(1)}K
資金費率: ${(fr*100).toFixed(4)}% ${fr<0?"(空頭付費)":"(多頭付費)"}
恐懼貪婪: ${fg}/100 (${MKT.fearLabel||"Unknown"})
BTC主導率: ${btcDom}%, 未平倉: ${(oi/1000).toFixed(1)}K BTC

用戶倉位：空單 $${CFG.entry.toLocaleString()} x${CFG.lev}倍, 止盈$${CFG.tp.toLocaleString()}, 止損$${CFG.sl.toLocaleString()}, 浮盈${pnl}%
凱利公式：R/R=${br.toFixed(2)}:1, 估計勝率${(winEst*100).toFixed(0)}%, 最優倉位${kelly}%

請只回傳JSON，不要markdown：
{"verdict":"偏多|偏空|中性|強烈偏多|強烈偏空","score":65,"summary":"一句話判斷20字內","signals":[{"factor":"資金費率","signal":"偏多","detail":"費率說明"},{"factor":"市場情緒","signal":"偏多","detail":"F&G說明"},{"factor":"技術動能","signal":"中性","detail":"RSI說明"},{"factor":"主導率","signal":"中性","detail":"主導率說明"},{"factor":"倉位風控","signal":"中性","detail":"倉位說明"}],"risks":["風險1","風險2","風險3"],"actions":["行動建議1","行動建議2"],"kelly_advice":"凱利建議說明","confidence":70}`;
}

async function triggerAI(){
  if(_aiLoading)return;
  _aiLoading=true;_aiResult=null;
  _page="ai";
  document.querySelectorAll(".nb").forEach(b=>b.classList.remove("on"));
  document.querySelectorAll(".nb")[0].classList.add("on");
  renderPage();
  const prompt=buildPrompt();
  if(!CFG.apikey){await demoMode();}
  else{await callAPI(prompt,CFG.apikey);}
  _aiLoading=false;renderPage();
}

async function demoMode(){
  await new Promise(r=>setTimeout(r,900));
  const p=MKT.price||67000,fr=MKT.fundingRate||0,rsi=MKT.rsi14||50,fg=MKT.fearGreed||30;
  const btcDom=parseFloat(MACRO.btcDom||50);
  let score=50;
  if(fr<0)score+=15;if(fg<30)score+=10;if(rsi<35)score+=10;
  if(MKT.ma50&&MKT.ma200&&MKT.ma50<MKT.ma200)score-=10;
  if(btcDom>58)score-=5;
  score=Math.max(20,Math.min(85,score));
  const vs=["強烈偏空","偏空","中性","偏多","強烈偏多"];
  const vi=score<35?0:score<45?1:score<55?2:score<65?3:4;
  const rw=Math.abs(CFG.entry-CFG.tp),rk=Math.abs(CFG.sl-CFG.entry),br=rw/rk;
  const winEst=rsi<40?0.55:rsi>65?0.40:0.50;
  const kelly=((br*winEst-(1-winEst))/br*100).toFixed(1);
  _aiResult={
    verdict:vs[vi],score:score,
    summary:fr<0&&fg<35?"負費率+極度恐懼，逆向多頭信號強":"等待方向確認信號",
    signals:[
      {factor:"資金費率",signal:fr<0?"偏多":"偏空",detail:"費率"+(fr*100).toFixed(4)+"% "+(fr<0?"空頭付費，統計上多頭占優":"多頭持倉成本偏高")},
      {factor:"市場情緒",signal:fg<25?"強烈偏多":fg<45?"偏多":"中性",detail:"F&G "+fg+"/100 ("+(MKT.fearLabel||"Unknown")+")"+(fg<30?" 極度恐懼往往是底部信號":"")},
      {factor:"技術動能",signal:rsi<35?"偏多":rsi>65?"偏空":"中性",detail:"RSI "+rsi.toFixed(1)+(rsi<35?" 超賣反彈概率提升":rsi>65?" 超買注意回調":" 中性區間")},
      {factor:"BTC主導率",signal:btcDom>55?"偏空":"偏多",detail:"主導率"+btcDom+"% "+(btcDom>55?"資金集中BTC，山寨疲軟":"主導率下降，市場風險偏好升")},
      {factor:"倉位風控",signal:"中性",detail:"空單入場$"+CFG.entry.toLocaleString()+" 當前浮盈"+(MKT.price?((CFG.entry-MKT.price)/CFG.entry*100*CFG.lev).toFixed(2):"N/A")+"%"},
    ],
    risks:["宏觀風險：美聯儲政策收緊","技術面："+(MKT.ma50&&MKT.ma200&&MKT.ma50<MKT.ma200?"仍在死叉格局":"均線多頭排列"),"費率翻轉可能引發踩踏"],
    actions:[fr<0&&fg<35?"$"+CFG.tp+"附近考慮分批平空翻多":"持倉觀望等待支撐確認","嚴守止損$"+CFG.sl.toLocaleString()+" 不輕易移動"],
    kelly_advice:"凱利建議使用總資金"+(parseFloat(kelly)>0?kelly:0)+"% R/R="+br.toFixed(2)+":1",
    confidence:Math.round(50+score/5),
    _demo:true,
  };
}

async function callAPI(prompt,apiKey){
  try{
    const resp=await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",
      headers:{"Content-Type":"application/json","x-api-key":apiKey,"anthropic-version":"2023-06-01"},
      body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,messages:[{role:"user",content:prompt}]}),
    });
    const data=await resp.json();
    const text=data.content&&data.content[0]?data.content[0].text||"":"";
    const clean=text.replace(/```json|```/g,"").trim();
    _aiResult=JSON.parse(clean);
  }catch(e){console.error(e);await demoMode();}
}

// ════════════════════════════════
function pgKelly(){
  const p=MKT.price,rsi=MKT.rsi14,fr=MKT.fundingRate,fg=MKT.fearGreed;
  let winEst=0.50,winNote="中性RSI → 基準勝率";
  if(rsi!=null&&rsi<30){winEst=0.60;winNote="RSI超賣 → 勝率+10%";}
  else if(rsi!=null&&rsi>70){winEst=0.38;winNote="RSI超買 → 勝率-12%";}
  if(fr!=null&&fr<-0.005){winEst=Math.min(0.72,winEst+0.08);winNote+=" · 費率負 +8%";}
  if(fg!=null&&fg<25){winEst=Math.min(0.74,winEst+0.06);winNote+=" · 極恐 +6%";}

  const rw=Math.abs(CFG.entry-CFG.tp),rk=Math.abs(CFG.sl-CFG.entry),br=rw/rk;
  const kelly=(br*winEst-(1-winEst))/br;
  const half=kelly/2,quarter=kelly/4;
  const pnlPct=p?((CFG.entry-p)/CFG.entry*100*CFG.lev):null;

  const scenariosH=[
    {name:"全凱利",k:kelly,note:"理論最優，波動極大",col:C.rd},
    {name:"半凱利",k:half,note:"風險收益平衡，推薦使用",col:C.yl},
    {name:"1/4凱利",k:quarter,note:"保守穩健",col:C.gr},
  ].map(s=>'<div style="background:'+s.col+'08;border:1px solid '+s.col+'22;border-radius:10px;padding:12px 14px;margin-bottom:8px"><div style="display:flex;justify-content:space-between;align-items:center"><div><div style="font-size:10px;color:var(--mt)">'+s.name+'</div><div class="kelly-big" style="color:'+s.col+';">'+(s.k>0?(s.k*100).toFixed(1)+"%":"不開倉")+'</div><div style="font-size:10px;color:var(--tx);margin-top:2px">'+s.note+'</div></div>'+(s.k>0?'<div style="text-align:right"><div style="font-size:9px;color:var(--mt)">R/R='+br.toFixed(2)+':1</div><div style="font-size:9px;color:var(--mt)">勝率='+(winEst*100).toFixed(0)+'%</div></div>':'')+'</div></div>').join("");

  const formulaH='<div class="ai-card"><div class="ai-badge">✦ 計算過程</div><div class="mono" style="font-size:11px;color:var(--tx);line-height:2;background:rgba(0,0,0,.3);border-radius:8px;padding:12px;margin-bottom:10px">f* = (b × p - q) / b\nb = R/R比 = '+br.toFixed(2)+'\np = 勝率 = '+(winEst*100).toFixed(0)+'%\nq = 敗率 = '+((1-winEst)*100).toFixed(0)+'%\nf* = ('+br.toFixed(2)+' × '+winEst.toFixed(2)+' - '+(1-winEst).toFixed(2)+') / '+br.toFixed(2)+' = '+(kelly*100).toFixed(1)+'%</div><div style="font-size:11px;color:var(--tx);line-height:1.6"><span style="color:var(--yl)">勝率估算依據：</span>'+winNote+'</div></div>';

  const posH=pnlPct!=null?'<div class="card" style="background:'+(pnlPct>0?"rgba(16,185,129,.06)":"rgba(239,68,68,.06)")+';border-color:'+(pnlPct>0?C.gr:C.rd)+'22"><div class="ct">現有空單狀態</div><div style="display:flex;justify-content:space-between;align-items:center"><div><div style="font-size:10px;color:var(--mt)">入場 $'+CFG.entry.toLocaleString()+' · '+CFG.lev+'X</div><div class="mono" style="font-size:22px;font-weight:700;color:'+(pnlPct>0?C.gr:C.rd)+'">'+(pnlPct>0?"+":"")+pnlPct.toFixed(2)+'%</div></div><div style="text-align:right"><div class="mono" style="font-size:12px;color:'+C.gr+'">TP $'+CFG.tp.toLocaleString()+'</div><div class="mono" style="font-size:12px;color:'+C.rd+'">SL $'+CFG.sl.toLocaleString()+'</div></div></div></div>':'<div class="card"><div class="ct">倉位設定</div><div style="font-size:12px;color:var(--mt)">請設定入場/止盈/止損以計算</div><button onclick="openSetting()" style="margin-top:8px;background:rgba(99,102,241,.15);border:1px solid rgba(99,102,241,.3);color:#A5B4FC;padding:6px 14px;border-radius:7px;font-size:12px">設定</button></div>';

  const warnsH='<div class="card" style="border-color:rgba(239,68,68,.2)"><div class="ct">使用注意</div>'+
    ["凱利假設勝率穩定，加密市場波動劇烈，建議使用半凱利或更低",
     "槓桿交易：顯示%為保證金佔比，實際風險 = 倉位 × 槓桿倍數",
     "永遠設定止損，凱利公式不抵禦黑天鵝事件",
     "建議結合RSI+費率+情緒多因子動態調整勝率估算值"].map(t=>'<div style="font-size:11px;color:#FCA5A5;display:flex;gap:6px;margin-bottom:6px"><span>⚠</span><span>'+t+'</span></div>').join("")+'</div>';

  return '<div class="tbar"><div><div style="font-size:15px;font-weight:800;color:var(--wh)">🎯 凱利公式速算</div><div style="font-size:10px;color:var(--mt)">動態勝率 · 最優倉位建議</div></div><button onclick="openSetting()" style="background:rgba(99,102,241,.15);border:1px solid rgba(99,102,241,.3);color:#A5B4FC;padding:5px 12px;border-radius:7px;font-size:11px">設定</button></div><div style="height:12px"></div>'+posH+formulaH+'<div class="card"><div class="ct">倉位方案</div>'+scenariosH+'</div>'+warnsH;
}

function openSetting(){
  $("s_entry").value=CFG.entry;$("s_tp").value=CFG.tp;
  $("s_sl").value=CFG.sl;$("s_lev").value=CFG.lev;
  $("s_apikey").value=CFG.apikey||"";
  $("sOverlay").classList.add("open");
}
function closeSetting(){$("sOverlay").classList.remove("open");}
function saveSetting(){
  CFG.entry=parseFloat($("s_entry").value)||CFG.entry;
  CFG.tp=parseFloat($("s_tp").value)||CFG.tp;
  CFG.sl=parseFloat($("s_sl").value)||CFG.sl;
  CFG.lev=parseFloat($("s_lev").value)||CFG.lev;
  CFG.apikey=($("s_apikey").value||"").trim();
  try{localStorage.setItem("btc_ai_cfg",JSON.stringify(CFG));}catch(e){}
  closeSetting();renderPage();
}

document.addEventListener("DOMContentLoaded",function(){
  connectWS();
  fetchAll();
  setInterval(fetchAll,30000);
  renderPage();
});
