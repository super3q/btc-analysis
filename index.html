        // ── Kelly Criterion Engine ────────────────────────────────────
        function kellyFraction(winRate, avgWin, avgLoss) {
            if (avgLoss === 0) return 0;
            const b = avgWin / avgLoss; 
            const p = winRate;
            const q = 1 - p;
            const kelly = (b * p - q) / b;
            return Math.max(0, Math.min(kelly, 1));
        }

        function halfKelly(winRate, avgWin, avgLoss) {
            return kellyFraction(winRate, avgWin, avgLoss) * 0.5;
        }

        // ── AI Analysis Framework ─────────────────────────────────────
        function generateAIAnalysis(data) {
            const { fearGreed, funding, priceChange24h, volatility, longShortRatio, btcDominance } = data;
            let score = 0;
            const signals = [];

            const sentimentScore = (fearGreed - 50) * -0.5;
            score += sentimentScore;
            if (fearGreed < 20) signals.push({ factor: "極度恐懼", direction: "bullish", weight: "high", detail: `FGI=${fearGreed}，逆勢看多條件觸發` });
            else if (fearGreed > 80) signals.push({ factor: "極度貪婪", direction: "bearish", weight: "high", detail: `FGI=${fearGreed}，過熱修正風險` });
            else signals.push({ factor: "情緒中性", direction: "neutral", weight: "low", detail: `FGI=${fearGreed}` });

            const fundingScore = funding > 0.01 ? -20 : funding < -0.01 ? 20 : funding * 1000;
            score += fundingScore;
            if (funding > 0.03) signals.push({ factor: "資金費率過高", direction: "bearish", weight: "high", detail: `${(funding * 100).toFixed(4)}%，多頭擁擠` });
            else if (funding < -0.01) signals.push({ factor: "負資金費率", direction: "bullish", weight: "medium", detail: `${(funding * 100).toFixed(4)}%，空頭付費` });
            else signals.push({ factor: "資金費率正常", direction: "neutral", weight: "low", detail: `${(funding * 100).toFixed(4)}%` });

            const momentumScore = priceChange24h > 5 ? -15 : priceChange24h < -5 ? 15 : -priceChange24h * 3;
            score += momentumScore;
            if (Math.abs(priceChange24h) > 5) {
                signals.push({
                    factor: priceChange24h > 0 ? "短期超漲" : "短期超跌",
                    direction: priceChange24h > 0 ? "bearish" : "bullish",
                    weight: "medium",
                    detail: `24h: ${priceChange24h > 0 ? "+" : ""}${priceChange24h.toFixed(2)}%`,
                });
            }

            const volScore = volatility > 4 ? -10 : volatility < 1.5 ? 5 : 0;
            score += volScore;
            signals.push({
                factor: volatility > 4 ? "高波動風險" : "波動正常",
                direction: volatility > 4 ? "bearish" : "neutral",
                weight: volatility > 4 ? "medium" : "low",
                detail: `30D Vol: ${volatility.toFixed(1)}%`,
            });

            const lsScore = longShortRatio > 2 ? -20 : longShortRatio < 0.8 ? 15 : (1.2 - longShortRatio) * 20;
            score += lsScore;
            if (longShortRatio > 1.8) signals.push({ factor: "多空比過高", direction: "bearish", weight: "high", detail: `L/S=${longShortRatio.toFixed(2)}` });
            else if (longShortRatio < 0.8) signals.push({ factor: "空頭主導", direction: "bullish", weight: "medium", detail: `L/S=${longShortRatio.toFixed(2)}` });

            score = Math.max(-100, Math.min(100, score));

            const direction = score > 15 ? "LONG" : score < -15 ? "SHORT" : "NEUTRAL";
            const conviction = Math.abs(score);

            let winRate, avgWinPct, avgLossPct;
            if (direction === "LONG") {
                winRate = 0.45 + conviction * 0.003;
                avgWinPct = 3 + conviction * 0.05;
                avgLossPct = 2 + (100 - conviction) * 0.02;
            } else if (direction === "SHORT") {
                winRate = 0.42 + conviction * 0.003;
                avgWinPct = 2.5 + conviction * 0.04;
                avgLossPct = 2.5 + (100 - conviction) * 0.02;
            } else {
                winRate = 0.5;
                avgWinPct = 2;
                avgLossPct = 2;
            }
            winRate = Math.min(winRate, 0.72);

            return {
                score, direction, conviction, signals,
                kelly: {
                    full: kellyFraction(winRate, avgWinPct, avgLossPct),
                    half: halfKelly(winRate, avgWinPct, avgLossPct),
                    winRate, avgWin: avgWinPct, avgLoss: avgLossPct,
                    riskReward: (avgWinPct / avgLossPct).toFixed(2),
                },
            };
        }

        // ── Simulated Real-time Data ────
        function useSimulatedData() {
            const [data, setData] = useState(null);
            const [lastUpdate, setLastUpdate] = useState(null);

            const fetchData = useCallback(() => {
                const btcPrice = 67800 + (Math.random() - 0.48) * 800;
                setData({
                    btcPrice,
                    priceChange24h: -1.2 + (Math.random() - 0.5) * 3,
                    volume24h: 28.5 + Math.random() * 5,
                    fearGreed: Math.floor(25 + Math.random() * 15),

                    longShortRatio: 0.95 + Math.random() * 0.4,
                    volatility: 2.8 + Math.random() * 1.5,
                    btcDominance: 57.2 + Math.random() * 2,
                    maxPain: 69000,
                    vix: 22.5 + Math.random() * 5,
                    sp500Change: -0.3 + Math.random() * 0.8,
                    dxy: 104.2 + Math.random() * 1.5,
                    us10y: 4.35 + Math.random() * 0.2,
                    gold: 2920 + Math.random() * 50,
                    hashRate: 620 + Math.random() * 30,
                    exchangeReserve: 2.35 + Math.random() * 0.15,
                    pcr: 0.65 + Math.random() * 0.3,
                    etfFlowDaily: -120 + Math.random() * 300,
                    etfFlowWeekly: -500 + Math.random() * 1200,
                });
                setLastUpdate(new Date());
            }, []);

            useEffect(() => {
                fetchData();
                const interval = setInterval(fetchData, 30000);
                return () => clearInterval(interval);
            }, [fetchData]);

            return { data, lastUpdate, refresh: fetchData };
        }

        // ── Components ───────────────────────────────────────────
        function Sparkline({ data, color = "#00ff88", width = 120, height = 32 }) {
            if (!data || data.length < 2) return null;
            const min = Math.min(...data);
            const max = Math.max(...data);
            const range = max - min || 1;
            const points = data.map((v, i) => `${(i / (data.length - 1)) * width},${height - ((v - min) / range) * height}`).join(" ");
            return (
                <svg width={width} height={height} style={{ display: "block" }}>
                    <polyline points={points} fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" />
                </svg>
            );
        }

        function ScoreGauge({ score, size = 180 }) {
            const normalized = (score + 100) / 200;
            const angle = -135 + normalized * 270;
            const color = score > 25 ? "#00ff88" : score > 0 ? "#88ffaa" : score > -25 ? "#ffaa00" : "#ff4444";
            const r = size * 0.38;
            const cx = size / 2, cy = size / 2;
            const rad = (angle * Math.PI) / 180;
            const nx = cx + r * Math.cos(rad), ny = cy + r * Math.sin(rad);

            return (
                <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`}>
                    <path d={describeArc(cx, cy, r, -135, 135)} fill="none" stroke="rgba(255,255,255,0.08)" strokeWidth={size * 0.06} strokeLinecap="round" />
                    <path d={describeArc(cx, cy, r, -135, angle)} fill="none" stroke={color} strokeWidth={size * 0.06} strokeLinecap="round" style={{ filter: `drop-shadow(0 0 6px ${color}80)` }} />
                    <circle cx={nx} cy={ny} r={size * 0.025} fill={color} style={{ filter: `drop-shadow(0 0 4px ${color})` }} />
                    <text x={cx} y={cy - 4} textAnchor="middle" fill="white" fontSize={size * 0.18} fontWeight="800">{score > 0 ? "+" : ""}{score.toFixed(0)}</text>
                    <text x={cx} y={cy + size * 0.12} textAnchor="middle" fill="rgba(255,255,255,0.5)" fontSize={size * 0.065}>COMPOSITE</text>
                    <text x={size * 0.12} y={cy + r + 16} textAnchor="middle" fill="#ff4444" fontSize={size * 0.05}>SHORT</text>
                    <text x={size * 0.88} y={cy + r + 16} textAnchor="middle" fill="#00ff88" fontSize={size * 0.05}>LONG</text>
                </svg>
            );
        }

        function describeArc(x, y, radius, startAngle, endAngle) {
            const start = polarToCartesian(x, y, radius, endAngle);
            const end = polarToCartesian(x, y, radius, startAngle);
            const largeArcFlag = endAngle - startAngle <= 180 ? "0" : "1";
            return `M ${start.x} ${start.y} A ${radius} ${radius} 0 ${largeArcFlag} 0 ${end.x} ${end.y}`;
        }

        function polarToCartesian(cx, cy, r, deg) {
            const rad = ((deg - 90) * Math.PI) / 180;
            return { x: cx + r * Math.cos(rad), y: cy + r * Math.sin(rad) };
        }

                            <Sparkline data={sparkHistory} color={data.fearGreed < 30 ? "#ff4444" : data.fearGreed > 70 ? "#00ff88" : "#ffaa00"} width={120} height={32} />
                        </div>
                    </div>
                    <div style={styles.card}>
                        <div style={styles.cardLabel}>Kelly 建議倉位</div>
                        <div style={styles.kellyQuick}>
                            <div>
                                <span style={styles.kellyQuickLabel}>Full Kelly</span>
                                <span style={styles.kellyQuickValue}>{(analysis.kelly.full * 100).toFixed(1)}%</span>
                            </div>
                            <div style={styles.kellyDivider} />
                            <div>
                                <span style={styles.kellyQuickLabel}>Half Kelly ★</span>
                                <span style={{ ...styles.kellyQuickValue, color: "#00ff88" }}>{(analysis.kelly.half * 100).toFixed(1)}%</span>
                            </div>
                        </div>
                        <div style={styles.kellyNote}>WR: {(analysis.kelly.winRate * 100).toFixed(1)}% · R/R: {analysis.kelly.riskReward}</div>
                    </div>
                    <div style={{ ...styles.card, gridColumn: "1 / -1" }}>
                        <div style={styles.cardLabel}>多因子信號面板</div>
                        <div style={styles.signalGrid}>
                            {analysis.signals.map((s, i) => (
                                <div key={i} style={styles.signalRow}>
                                    <span style={{ ...styles.signalDot, background: s.direction === "bullish" ? "#00ff88" : s.direction === "bearish" ? "#ff4444" : "#666" }} />
                                    <span style={styles.signalFactor}>{s.factor}</span>
                                    <span style={styles.signalDetail}>{s.detail}</span>
                                    <span style={{ ...styles.signalWeight, color: s.weight === "high" ? "#fff" : s.weight === "medium" ? "rgba(255,255,255,0.6)" : "rgba(255,255,255,0.3)" }}>{s.weight.toUpperCase()}</span>
                                </div>
                            ))}
                        </div>
                    </div>
                    <div style={{ ...styles.card, gridColumn: "1 / -1" }}>
                        <div style={styles.cardLabel}>宏觀速覽</div>
                        <div style={styles.macroQuickGrid}>
                            <MacroTile label="VIX" value={data.vix.toFixed(1)} status={data.vix > 25 ? "danger" : data.vix > 18 ? "warn" : "ok"} />
                            <MacroTile label="S&P 500" value={`${data.sp500Change > 0 ? "+" : ""}${data.sp500Change.toFixed(2)}%`} status={data.sp500Change > 0 ? "ok" : "danger"} />
                            <MacroTile label="DXY" value={data.dxy.toFixed(1)} status={data.dxy > 105 ? "danger" : "ok"} />
                            <MacroTile label="US10Y" value={`${data.us10y.toFixed(2)}%`} status={data.us10y > 4.5 ? "danger" : "ok"} />
                            <MacroTile label="Gold" value={`$${data.gold.toFixed(0)}`} status="ok" />
                            <MacroTile label="資金費率" value={`${(data.funding * 100).toFixed(4)}%`} status={data.funding > 0.02 ? "danger" : data.funding < -0.005 ? "warn" : "ok"} />
                            <MacroTile label="PCR" value={data.pcr.toFixed(2)} status={data.pcr > 0.9 ? "warn" : "ok"} />
                            <MacroTile label="ETF 日流" value={`${data.etfFlowDaily > 0 ? "+" : ""}$${(data.etfFlowDaily).toFixed(0)}M`} status={data.etfFlowDaily > 0 ? "ok" : "danger"} />
                        </div>
                    </div>
                </div>
            );
        }

        function MacroMatrixView({ data }) {
            const factors = [
                { id: 1, name: "美股相關性", desc: "S&P 500 滾動相關係數 ~0.55", metrics: [{ label: "VIX 恐慌指數", value: data.vix.toFixed(1) }, { label: "S&P 500", value: `${data.sp500Change > 0 ? "+" : ""}${data.sp500Change.toFixed(2)}%` }], signal: data.sp500Change > 0 && data.vix < 22 ? "bullish" : data.vix > 28 ? "bearish" : "neutral" },
                { id: 2, name: "ETF 資金流", desc: "需求驅動因子", metrics: [{ label: "日淨流入", value: `$${data.etfFlowDaily.toFixed(0)}M` }, { label: "週淨流入", value: `$${data.etfFlowWeekly.toFixed(0)}M` }], signal: data.etfFlowDaily > 100 ? "bullish" : data.etfFlowDaily < -50 ? "bearish" : "neutral" },
                { id: 3, name: "風險溢價", desc: "地緣政治與宏觀", metrics: [{ label: "Gold", value: `$${data.gold.toFixed(0)}` }, { label: "DXY", value: data.dxy.toFixed(1) }, { label: "US10Y", value: `${data.us10y.toFixed(2)}%` }], signal: data.gold > 2950 ? "bearish" : data.dxy < 103 ? "bullish" : "neutral" },
                { id: 4, name: "衍生品結構", desc: "資金費率與期權", metrics: [{ label: "資金費率", value: `${(data.funding * 100).toFixed(4)}%` }, { label: "PCR", value: data.pcr.toFixed(2) }], signal: data.funding < -0.005 ? "bullish" : data.funding > 0.03 ? "bearish" : "neutral" },
            ];
            return (
                <div>
                    <div style={styles.sectionHeader}>

                    </div>
                    <div style={styles.factorList}>
                        {factors.map(f => (

        function KellyEngineView({ analysis, data }) {
            const k = analysis.kelly;
            const balance = 10000;
            const leverage = 5;
            const positionSize = balance * k.half;
            const notional = positionSize * leverage;
            return (
                <div>
                    <div style={styles.formulaCard}>
                        <div style={styles.formulaHeader}>
                            <span style={styles.formulaTitle}>Kelly Criterion Formula</span>
                            <span style={styles.formulaBadge}>數學最佳化</span>
                        </div>
                        <div style={styles.formulaBody}>f* = (b·p − q) / b</div>
                        <div style={styles.formulaVars}>b = 盈虧比({k.riskReward}) · p = 勝率({(k.winRate * 100).toFixed(1)}%) · q = 賠率({((1 - k.winRate) * 100).toFixed(1)}%)</div>
                    </div>
                    <div style={styles.kellyResultGrid}>
                        <div style={styles.kellyResultCard}><div style={styles.kellyResultLabel}>Full Kelly</div><div style={styles.kellyResultValue}>{(k.full * 100).toFixed(2)}%</div></div>
                        <div style={{ ...styles.kellyResultCard, borderColor: "#00ff8840" }}><div style={styles.kellyResultLabel}>Half Kelly ★</div><div style={{ ...styles.kellyResultValue, color: "#00ff88" }}>{(k.half * 100).toFixed(2)}%</div></div>
                        <div style={styles.kellyResultCard}><div style={styles.kellyResultLabel}>預估勝率</div><div style={styles.kellyResultValue}>{(k.winRate * 100).toFixed(1)}%</div></div>
                        <div style={styles.kellyResultCard}><div style={styles.kellyResultLabel}>R/R 比</div><div style={styles.kellyResultValue}>{k.riskReward}</div></div>
                    </div>
                    <div style={styles.sizingCard}>
                        <div style={styles.cardLabel}>實戰倉位試算 (示例帳戶 $10,000)</div>
                        <div style={styles.sizingGrid}>
