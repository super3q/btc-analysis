<!DOCTYPE html>

<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>BTC 五因子監測</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #080C14; color: #E2E8F0; font-family: -apple-system, 'SF Pro Display', 'Helvetica Neue', sans-serif; padding: 16px 12px; min-height: 100vh; }
.mono { font-family: 'JetBrains Mono', monospace; }
.container { max-width: 520px; margin: 0 auto; }
.header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 14px; }
.price { font-size: 34px; font-weight: 700; color: #F8FAFC; line-height: 1.1; }
.change { font-size: 14px; margin-top: 2px; }
.change.up { color: #10B981; } .change.down { color: #EF4444; }
.ws-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 6px; }
.ws-dot.on { background: #10B981; box-shadow: 0 0 6px #10B98188; }
.ws-dot.off { background: #EF4444; box-shadow: 0 0 6px #EF444488; }
.card { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06); border-radius: 10px; padding: 12px 14px; margin-bottom: 10px; }
.card-title { font-size: 11px; color: #64748B; letter-spacing: 1px; margin-bottom: 8px; }
.pnl-banner { border-radius: 10px; padding: 10px 14px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
.pnl-banner.profit { background: rgba(16,185,129,0.1); border: 1px solid rgba(16,185,129,0.3); }
.pnl-banner.loss { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3); }
.alert-box { border-radius: 8px; padding: 8px 14px; margin-bottom: 6px; font-size: 12px; display: flex; align-items: center; gap: 8px; }
.alert-danger { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3); color: #FCA5A5; }
.alert-warning { background: rgba(245,158,11,0.1); border: 1px solid rgba(245,158,11,0.3); color: #FDE68A; }
.alert-ok { background: rgba(16,185,129,0.1); border: 1px solid rgba(16,185,129,0.3); color: #6EE7B7; }
.posbar-wrap { position: relative; height: 40px; background: rgba(255,255,255,0.04); border-radius: 6px; margin-bottom: 36px; overflow: visible; }
.posbar-marker { position: absolute; top: 0; bottom: 0; width: 1px; z-index: 5; }
.posbar-label { position: absolute; bottom: -22px; transform: translateX(-50%); font-size: 9px; white-space: nowrap; }
.posbar-price { position: absolute; top: -22px; transform: translateX(-50%); font-size: 11px; font-weight: 700; color: #F8FAFC; white-space: nowrap; }
.posbar-now { position: absolute; top: -2px; bottom: -2px; width: 3px; background: #F8FAFC; border-radius: 2px; z-index: 10; box-shadow: 0 0 8px rgba(248,250,252,0.5); }
.factor { background: rgba(255,255,255,0.03); border-radius: 8px; padding: 12px 14px; margin-bottom: 8px; border-left: 3px solid #64748B; }
.factor-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
.factor-num { font-size: 12px; color: #64748B; }
.pill { font-size: 11px; font-weight: 600; padding: 2px 10px; border-radius: 4px; }
.pill-bull { color: #10B981; background: rgba(16,185,129,0.12); }
.pill-bear { color: #EF4444; background: rgba(239,68,68,0.12); }
.pill-neutral { color: #F59E0B; background: rgba(245,158,11,0.12); }
.pill-loading { color: #6B7280; background: rgba(107,114,128,0.12); }
.factor-val { font-size: 22px; font-weight: 700; color: #F1F5F9; }
.factor-detail { font-size: 11px; color: #94A3B8; margin-top: 4px; line-height: 1.5; }
.contra-box { border-radius: 10px; padding: 12px 14px; margin-bottom: 12px; }
.contra-safe { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06); }
.contra-warn { background: rgba(239,68,68,0.08); border: 1px solid rgba(239,68,68,0.3); }
.contra-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
.contra-item { font-size: 11px; color: #CBD5E1; display: flex; align-items: center; gap: 6px; }
.tech-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
.tech-label { font-size: 10px; color: #64748B; }
.tech-val { font-size: 14px; font-weight: 600; color: #E2E8F0; }
.tech-val.warn { color: #EF4444; }
.kelly-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.kelly-label { font-size: 10px; color: #94A3B8; }
.kelly-val { font-size: 18px; font-weight: 700; }
.kelly-val.pos { color: #10B981; } .kelly-val.neg { color: #EF4444; }
.kelly-sub { font-size: 10px; color: #64748B; }
.overall-bar { border-radius: 10px; padding: 10px 14px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; }
.footer { font-size: 10px; color: #475569; text-align: center; line-height: 1.6; padding: 8px 0; }
/* Settings */
.gear-btn { background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); color: #94A3B8; width: 36px; height: 36px; border-radius: 8px; font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
.gear-btn:hover,.gear-btn.active { background: rgba(99,102,241,0.15); border-color: rgba(99,102,241,0.3); color: #A5B4FC; }
.settings-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 100; backdrop-filter: blur(4px); }
.settings-overlay.open { display: flex; justify-content: center; align-items: flex-start; padding-top: 40px; }
.settings-panel { background: #0F1629; border: 1px solid rgba(255,255,255,0.1); border-radius: 14px; width: 92%; max-width: 480px; max-height: 85vh; overflow-y: auto; padding: 20px 18px; }
.settings-panel::-webkit-scrollbar { width: 4px; }
.settings-panel::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }
.s-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 18px; }
.s-title { font-size: 18px; font-weight: 700; color: #F1F5F9; }
.s-close { background: none; border: none; color: #64748B; font-size: 24px; cursor: pointer; }
.s-section { margin-bottom: 18px; }
.s-section-title { font-size: 12px; color: #6366F1; font-weight: 600; letter-spacing: 1px; margin-bottom: 10px; border-bottom: 1px solid rgba(99,102,241,0.2); padding-bottom: 6px; }
.s-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 8px; }
.s-row.three { grid-template-columns: 1fr 1fr 1fr; }
.s-field label { display: block; font-size: 10px; color: #64748B; margin-bottom: 3px; }
.s-field input { width: 100%; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 6px; padding: 8px 10px; color: #F1F5F9; font-size: 14px; font-family: 'JetBrains Mono', monospace; outline: none; }
.s-field input:focus { border-color: rgba(99,102,241,0.5); }
.s-signal-row { padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.04); }
.s-signal-label { font-size: 13px; color: #CBD5E1; margin-bottom: 6px; }
.s-signal-btns { display: flex; gap: 4px; margin-bottom: 6px; }
.s-sig-btn { padding: 5px 12px; border-radius: 4px; font-size: 11px; font-weight: 600; border: 1px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.03); color: #64748B; cursor: pointer; }
.s-sig-btn.sel-bear { background: rgba(239,68,68,0.15); border-color: rgba(239,68,68,0.3); color: #FCA5A5; }
.s-sig-btn.sel-neutral { background: rgba(245,158,11,0.15); border-color: rgba(245,158,11,0.3); color: #FDE68A; }
.s-sig-btn.sel-bull { background: rgba(16,185,129,0.15); border-color: rgba(16,185,129,0.3); color: #6EE7B7; }
.s-note { width: 100%; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08); border-radius: 4px; padding: 5px 8px; color: #94A3B8; font-size: 11px; outline: none; }
.s-save-btn { width: 100%; padding: 12px; border-radius: 8px; border: none; background: linear-gradient(135deg, #6366F1, #8B5CF6); color: white; font-size: 15px; font-weight: 600; cursor: pointer; margin-top: 10px; }
.s-reset-btn { width: 100%; padding: 10px; border-radius: 8px; margin-top: 8px; border: 1px solid rgba(239,68,68,0.3); background: transparent; color: #FCA5A5; font-size: 13px; cursor: pointer; }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div>
      <div style="font-size:10px;color:#64748B;letter-spacing:2px">BTC 五因子監測</div>
      <div class="price mono" id="price">Loading...</div>
      <div class="change mono" id="change24h"></div>
    </div>
    <div style="display:flex;align-items:flex-start;gap:8px">
      <div style="text-align:right">
        <div style="font-size:11px;color:#64748B"><span class="ws-dot off" id="wsDot"></span><span id="wsLabel">連線中</span></div>
        <div style="font-size:10px;color:#475569;margin-top:2px" id="lastUpdate"></div>
      </div>
      <button class="gear-btn" id="gearBtn" onclick="toggleSettings()">⚙</button>
    </div>
  </div>
  <div id="pnlBanner"></div>
  <div id="alerts"></div>
  <div class="card"><div class="card-title">倉位地圖</div><div class="posbar-wrap" id="posBar"></div></div>
  <div id="overallSignal"></div>
  <div id="contraBox"></div>
  <div id="factors"></div>
  <div class="card"><div class="card-title">技術指標</div><div class="tech-grid" id="techGrid"></div></div>
  <div class="card"><div class="card-title">凱利公式速算</div><div class="kelly-grid" id="kellyGrid"></div></div>
  <div class="footer">數據源：Binance WS + REST · Fear & Greed: alternative.me<br>⚙ 可修改倉位參數與手動因子信號<br>非投資建議</div>
</div>

<div class="settings-overlay" id="settingsOverlay" onclick="if(event.target===this)toggleSettings()">
  <div class="settings-panel">
    <div class="s-header"><div class="s-title">⚙ 倉位與因子設定</div><button class="s-close" onclick="toggleSettings()">✕</button></div>
    <div class="s-section">
      <div class="s-section-title">空單倉位</div>
      <div class="s-row"><div class="s-field"><label>入場價</label><input id="s_entry" type="number" step="0.01"></div><div class="s-field"><label>持倉量 (USDT)</label><input id="s_size" type="number" step="0.1"></div></div>
      <div class="s-row three"><div class="s-field"><label>止盈</label><input id="s_tp" type="number" step="1"></div><div class="s-field"><label>止損</label><input id="s_sl" type="number" step="1"></div><div class="s-field"><label>槓桿</label><input id="s_lev" type="number" step="1"></div></div>
    </div>
    <div class="s-section">
      <div class="s-section-title">條件單</div>
      <div class="s-row"><div class="s-field"><label>加碼空單觸發</label><input id="s_addShort" type="number" step="1"></div><div class="s-field"><label>翻多觸發</label><input id="s_flipLong" type="number" step="1"></div></div>
      <div class="s-row"><div class="s-field"><label>多單止盈</label><input id="s_longTP" type="number" step="1"></div><div class="s-field"><label>多單止損</label><input id="s_longSL" type="number" step="1"></div></div>
    </div>
    <div class="s-section"><div class="s-section-title">手動因子信號</div><div id="manualFactors"></div></div>
    <button class="s-save-btn" onclick="saveSettings()">💾 儲存並套用</button>
    <button class="s-reset-btn" onclick="resetSettings()">重置為預設值</button>
  </div>
</div>

<script>
const DEFAULTS={entry:70740.73,tp:65800,sl:72500,addShort:74200,flipLong:65900,longTP:69500,longSL:64000,lev:5,size:1358.2,f2sig:"中性",f3sig:"偏空",f5sig:"偏多",f2note:"ETF: 需手動追蹤 bitbo.io/treasuries/etf-flows",f3note:"美伊衝突持續，油價上漲，美元走強。",f5note:"鯨魚 30 天累積 270K BTC。交易所儲備創 6 年新低。"};
function loadPOS(){try{const s=localStorage.getItem("btc_pos");if(s)return{...DEFAULTS,...JSON.parse(s)}}catch(e){}return{...DEFAULTS}}
function savePOSToLS(o){localStorage.setItem("btc_pos",JSON.stringify(o))}
let POS=loadPOS();
const state={price:null,change24h:null,vol24h:null,rsi14:null,atr14:null,ma50:null,ma200:null,fundingRate:null,oi:null,fearGreed:null,wsConnected:false,lastUpdate:null};

function toggleSettings(){const o=document.getElementById("settingsOverlay"),g=document.getElementById("gearBtn");if(o.classList.contains("open")){o.classList.remove("open");g.classList.remove("active")}else{populateSettings();o.classList.add("open");g.classList.add("active")}}
const mfDefs=[{key:"f2sig",label:"因子2 · ETF 資金流",nk:"f2note"},{key:"f3sig",label:"因子3 · 地緣政治風險",nk:"f3note"},{key:"f5sig",label:"因子5 · 鏈上行為",nk:"f5note"}];
const sigOpts=["偏空","中性","偏多"];
function populateSettings(){
  ["entry","size","tp","sl","lev","addShort","flipLong","longTP","longSL"].forEach(k=>document.getElementById("s_"+k).value=POS[k]);
  document.getElementById("manualFactors").innerHTML=mfDefs.map(f=>`
    <div class="s-signal-row"><div class="s-signal-label">${f.label}</div>
    <div class="s-signal-btns">${sigOpts.map(s=>{const cls=POS[f.key]===s?(s==="偏空"?"sel-bear":s==="偏多"?"sel-bull":"sel-neutral"):"";return`<button class="s-sig-btn ${cls}" data-key="${f.key}" data-val="${s}" onclick="selSig(this)">${s}</button>`}).join("")}</div>
    <input class="s-note" id="s_${f.nk}" value="${POS[f.nk]||''}" placeholder="備註..."></div>`).join("");
}
function selSig(btn){btn.parentElement.querySelectorAll(".s-sig-btn").forEach(b=>b.className="s-sig-btn");const v=btn.dataset.val;btn.className=`s-sig-btn ${v==="偏空"?"sel-bear":v==="偏多"?"sel-bull":"sel-neutral"}`}
function saveSettings(){
  ["entry","size","tp","sl","lev","addShort","flipLong","longTP","longSL"].forEach(k=>{const v=parseFloat(document.getElementById("s_"+k).value);if(!isNaN(v))POS[k]=v});
  mfDefs.forEach(f=>{const sel=document.querySelector(`[data-key="${f.key}"].sel-bear,[data-key="${f.key}"].sel-neutral,[data-key="${f.key}"].sel-bull`);if(sel)POS[f.key]=sel.dataset.val;const n=document.getElementById("s_"+f.nk);if(n)POS[f.nk]=n.value});
  savePOSToLS(POS);toggleSettings();render();
}
function resetSettings(){if(confirm("確定重置？")){localStorage.removeItem("btc_pos");POS={...DEFAULTS};populateSettings();render()}}

function calcATR(c,p=14){if(c.length<p+1)return null;let s=0;for(let i=c.length-p;i<c.length;i++){const h=+c[i][2],l=+c[i][3],pc=+c[i-1][4];s+=Math.max(h-l,Math.abs(h-pc),Math.abs(l-pc))}return s/p}
function calcMA(c,p){if(c.length<p)return null;return c.slice(-p).reduce((a,b)=>a+b,0)/p}

let ws=null;
function connectWS(){try{ws=new WebSocket("wss://stream.binance.com:9443/ws/btcusdt@ticker");ws.onopen=()=>{state.wsConnected=true;render()};ws.onmessage=e=>{const d=JSON.parse(e.data);state.price=parseFloat(d.c);state.change24h=parseFloat(d.P);state.vol24h=parseFloat(d.q);render()};ws.onerror=()=>{state.wsConnected=false;render()};ws.onclose=()=>{state.wsConnected=false;render();setTimeout(connectWS,5000)}}catch(e){setTimeout(connectWS,10000)}}

async function fetchREST(){
  try{const r=await fetch("https://api.binance.com/api/v3/klines?symbol=BTCUSDT&interval=1d&limit=201");const k=await r.json();if(Array.isArray(k)&&k.length>50){const c=k.map(x=>+x[4]);if(c.length>=15){let g=0,l=0;for(let i=1;i<=14;i++){const d=c[c.length-15+i]-c[c.length-15+i-1];if(d>0)g+=d;else l-=d}const ag=g/14,al=l/14;state.rsi14=al===0?100:100-100/(1+ag/al)}state.atr14=calcATR(k,14);state.ma50=calcMA(c,50);if(c.length>=200)state.ma200=calcMA(c,200)}}catch(e){}
  try{const r=await fetch("https://fapi.binance.com/fapi/v1/fundingRate?symbol=BTCUSDT&limit=1");const d=await r.json();if(Array.isArray(d)&&d[0])state.fundingRate=parseFloat(d[0].fundingRate)}catch(e){}
  try{const r=await fetch("https://fapi.binance.com/fapi/v1/openInterest?symbol=BTCUSDT");const d=await r.json();if(d.openInterest)state.oi=parseFloat(d.openInterest)}catch(e){}
  try{const r=await fetch("https://api.alternative.me/fng/?limit=1");const d=await r.json();if(d?.data?.[0])state.fearGreed=parseInt(d.data[0].value)}catch(e){}
  state.lastUpdate=new Date();render();
}

function render(){
  const p=state.price;
  document.getElementById("price").textContent=p?`$${p.toLocaleString(undefined,{maximumFractionDigits:0})}`:"Loading...";
  const ch=document.getElementById("change24h");if(state.change24h!==null){const c=state.change24h;ch.textContent=`${c>=0?"+":""}${c.toFixed(2)}%`;ch.className=`change mono ${c>=0?"up":"down"}`}
  document.getElementById("wsDot").className=`ws-dot ${state.wsConnected?"on":"off"}`;
  document.getElementById("wsLabel").textContent=state.wsConnected?"即時":"離線";
  document.getElementById("lastUpdate").textContent=state.lastUpdate?`REST: ${state.lastUpdate.toLocaleTimeString()}`:"";
  renderPnL();renderAlerts();renderPosBar();renderFactors();renderOverall();renderContra();renderTech();renderKelly();
}

function renderPnL(){const el=document.getElementById("pnlBanner");if(!state.price){el.innerHTML="";return}const pp=((POS.entry-state.price)/POS.entry)*100*POS.lev,pu=((POS.entry-state.price)/POS.entry)*POS.size,ip=pp>0;el.innerHTML=`<div class="pnl-banner ${ip?"profit":"loss"}"><div><div style="font-size:11px;color:#94A3B8">空單 @ $${POS.entry.toLocaleString()} · ${POS.lev}X</div><div class="mono" style="font-size:22px;font-weight:700;color:${ip?"#10B981":"#EF4444"}">${pp>0?"+":""}${pp.toFixed(2)}%</div></div><div style="text-align:right"><div style="font-size:11px;color:#94A3B8">浮盈</div><div class="mono" style="font-size:16px;font-weight:600;color:${ip?"#10B981":"#EF4444"}">${pu>0?"+":""}${pu.toFixed(2)} U</div></div></div>`}

function renderAlerts(){const el=document.getElementById("alerts"),a=[],p=state.price;if(p){if(p>=POS.sl-300)a.push({t:"danger",m:`🚨 接近空單止損 $${POS.sl.toLocaleString()}！距離 $${(POS.sl-p).toFixed(0)}`});if(p<=POS.tp+500&&p>POS.tp)a.push({t:"warning",m:`⚠️ 接近空單止盈 $${POS.tp.toLocaleString()}`});if(p<=POS.tp)a.push({t:"ok",m:`✅ 已達空單止盈區！`});if(p>=POS.addShort-300&&p<POS.addShort)a.push({t:"warning",m:`⚠️ 接近加碼空單 $${POS.addShort.toLocaleString()}`})}if(state.rsi14!==null&&state.rsi14<30)a.push({t:"warning",m:`⚠️ RSI ${state.rsi14.toFixed(1)} 超賣`});if(state.fundingRate!==null&&state.fundingRate<-0.01)a.push({t:"danger",m:`🚨 資金費率極負（${(state.fundingRate*100).toFixed(4)}%）軋空風險`});el.innerHTML=a.map(x=>`<div class="alert-box alert-${x.t}">${x.m}</div>`).join("")}

function renderPosBar(){const el=document.getElementById("posBar"),p=state.price;if(!p){el.innerHTML="";return}const mn=Math.min(POS.longSL,POS.tp,p)-1500,mx=Math.max(POS.addShort,POS.sl,p)+1500,rg=mx-mn,pc=v=>Math.max(0,Math.min(100,(v-mn)/rg*100));const lv=[{p:POS.longSL,l:"多止損",c:"#EF4444"},{p:POS.tp,l:"空止盈",c:"#10B981"},{p:POS.flipLong,l:"翻多",c:"#3B82F6"},{p:POS.entry,l:"空入場",c:"#F59E0B"},{p:POS.sl,l:"空止損",c:"#EF4444"},{p:POS.addShort,l:"加碼空",c:"#A855F7"}];let h=`<div style="position:absolute;left:0;width:${pc(POS.tp)}%;height:100%;background:rgba(16,185,129,0.08);border-radius:6px 0 0 6px"></div><div style="position:absolute;left:${pc(POS.sl)}%;width:${100-pc(POS.sl)}%;height:100%;background:rgba(239,68,68,0.08);border-radius:0 6px 6px 0"></div><div class="posbar-now" style="left:${pc(p)}%"></div><div class="posbar-price mono" style="left:${pc(p)}%">$${p.toLocaleString(undefined,{maximumFractionDigits:0})}</div>`;lv.forEach(l=>{h+=`<div class="posbar-marker" style="left:${pc(l.p)}%;background:${l.c}66"></div><div class="posbar-label mono" style="left:${pc(l.p)}%;color:${l.c}">${l.l}</div>`});el.innerHTML=h}

function getFactors(){const fr=state.fundingRate,ch=state.change24h;return[{num:1,title:"風險資產動能",sig:ch===null?"載入中":ch<-3?"偏空":ch>3?"偏多":"中性",val:ch!==null?`${ch>0?"+":""}${ch.toFixed(2)}%`:"—",det:ch!==null?`24h ${ch>0?"+":""}${ch.toFixed(2)}%。S&P500 相關性 ~0.55。`:""},{num:2,title:"ETF 資金流",sig:POS.f2sig,val:POS.f2sig,det:POS.f2note},{num:3,title:"地緣政治風險",sig:POS.f3sig,val:POS.f3sig,det:POS.f3note},{num:4,title:"衍生品結構",sig:fr===null?"載入中":fr<-0.005?"強烈偏多":fr<0?"偏多":fr>0.01?"偏空":"中性",val:fr!==null?`${(fr*100).toFixed(4)}%`:"—",det:fr!==null?`資金費率 ${(fr*100).toFixed(4)}%。${fr<0?"空頭付費，擁擠。":"多頭付費。"}`:""},{num:5,title:"鏈上行為",sig:POS.f5sig,val:POS.f5sig,det:POS.f5note}]}
function pillClass(s){if(s.includes("偏多"))return"pill-bull";if(s.includes("偏空"))return"pill-bear";if(s.includes("載入"))return"pill-loading";return"pill-neutral"}
function borderColor(s){if(s.includes("偏多"))return"#10B981";if(s.includes("偏空"))return"#EF4444";return"#F59E0B"}
function renderFactors(){document.getElementById("factors").innerHTML=getFactors().map(f=>`<div class="factor" style="border-left-color:${borderColor(f.sig)}"><div class="factor-head"><span class="factor-num">因子 ${f.num} · ${f.title}</span><span class="pill ${pillClass(f.sig)}">${f.sig}</span></div><div class="factor-val mono">${f.val}</div><div class="factor-detail">${f.det}</div></div>`).join("")}

function renderOverall(){const fs=getFactors(),bear=fs.filter(f=>f.sig.includes("偏空")).length,bull=fs.filter(f=>f.sig.includes("偏多")).length,c=bear>bull?"#EF4444":bull>bear?"#10B981":"#F59E0B",t=bear>bull?"偏空":bull>bear?"偏多（空單需謹慎）":"中性（觀望）";document.getElementById("overallSignal").innerHTML=`<div class="overall-bar" style="background:${c}10;border:1px solid ${c}33"><span style="font-size:13px;color:#CBD5E1">五因子綜合信號</span><span style="font-size:14px;font-weight:700;color:${c}">${t} (${bear}空/${bull}多)</span></div>`}

function renderContra(){const el=document.getElementById("contraBox"),fg=state.fearGreed,rsi=state.rsi14,fr=state.fundingRate;const cs=[{l:"Fear&Greed<20",met:fg!==null?fg<20:null,v:fg??"—"},{l:"RSI<30",met:rsi!==null?rsi<30:null,v:rsi?rsi.toFixed(1):"—"},{l:"資金費率負",met:fr!==null?fr<0:null,v:fr?(fr*100).toFixed(4)+"%":"—"},{l:"鯨魚累積",met:POS.f5sig==="偏多",v:POS.f5sig==="偏多"?"是":"否"}];const mc=cs.filter(c=>c.met===true).length,w=mc>=3;el.innerHTML=`<div class="contra-box ${w?"contra-warn":"contra-safe"}"><div style="font-size:12px;font-weight:600;margin-bottom:8px;color:${w?"#FCA5A5":"#64748B"}">${w?"🚨 逆向警報：做空對抗歷史統計":"📊 逆向指標檢查表"}</div><div class="contra-grid">${cs.map(c=>`<div class="contra-item"><span style="font-size:14px">${c.met===true?"✅":c.met===false?"❌":"❓"}</span><span>${c.l}: <span class="mono" style="color:#F1F5F9">${c.v}</span></span></div>`).join("")}</div>${w?'<div style="font-size:11px;color:#FCA5A5;margin-top:8px;line-height:1.6">K33：此條件 90 天做多勝率 78%。</div>':""}</div>`}

function renderTech(){const t=[{l:"RSI(14)",v:state.rsi14?state.rsi14.toFixed(1):"—",w:state.rsi14&&state.rsi14<30},{l:"ATR(14)",v:state.atr14?`$${state.atr14.toFixed(0)}`:"—"},{l:"MA50",v:state.ma50?`$${(state.ma50/1000).toFixed(1)}K`:"—"},{l:"MA200",v:state.ma200?`$${(state.ma200/1000).toFixed(1)}K`:"—"},{l:"OI",v:state.oi?`${(state.oi/1000).toFixed(1)}K`:"—"},{l:"Vol24h",v:state.vol24h?`$${(state.vol24h/1e9).toFixed(2)}B`:"—"}];document.getElementById("techGrid").innerHTML=t.map(i=>`<div><div class="tech-label">${i.l}</div><div class="tech-val mono ${i.w?"warn":""}">${i.v}</div></div>`).join("")}

function renderKelly(){const rw=POS.entry-POS.tp,rk=POS.sl-POS.entry,b=rw/rk;document.getElementById("kellyGrid").innerHTML=[{wr:0.4,label:"樂觀(40%)"},{wr:0.3,label:"保守(30%)"}].map(s=>{const k=(b*s.wr-(1-s.wr))/b;return`<div><div class="kelly-label">勝率 ${s.label}</div><div class="kelly-val mono ${k>0?"pos":"neg"}">${k>0?(k*100).toFixed(1)+"%":"不下注"}</div><div class="kelly-sub">R/R=${b.toFixed(2)}:1</div></div>`}).join("")}

connectWS();fetchREST();setInterval(fetchREST,30000);render();
</script>
