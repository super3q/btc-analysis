<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BTC Macro Kelly App (Ultimate Real Data + Sanity Check)</title>
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <style>
        body { margin: 0; background-color: #0a0a0f; color: #e0e0e0; font-family: 'JetBrains Mono', 'SF Mono', 'Fira Code', monospace; }
        #root { min-height: 100vh; }
        @keyframes pulse { 0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(0, 255, 136, 0.7); } 70% { transform: scale(1); box-shadow: 0 0 0 10px rgba(0, 255, 136, 0); } 100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(0, 255, 136, 0); } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useCallback, useRef } = React;

        // ── Kelly Criterion Engine ────────────────────────────────────
        function kellyFraction(winRate, avgWin, avgLoss) {
            if (avgLoss === 0) return 0;
            const b = avgWin / avgLoss; 
            const p = winRate;
            const q = 1 - p;
            const kelly = (b * p - q) / b;
            return Math.max(0, Math.min(kelly, 1));
        }

        function halfKelly(winRate, avgWin, avgLoss) {
            return kellyFraction(winRate, avgWin, avgLoss) * 0.5; // 保守防禦策略：一律減半
        }

        // ── AI Analysis Framework ─────────────────────────────────────
        function generateAIAnalysis(data) {
            const { fearGreed, funding, priceChange24h, volatility, longShortRatio, vix, us10y } = data;
            let score = 0;
            const signals = [];

            // 1. 市場情緒 (FGI)
            const sentimentScore = (fearGreed - 50) * -0.5;
            score += sentimentScore;
            if (fearGreed < 25) signals.push({ factor: "極度恐懼", direction: "bullish", weight: "high", detail: `FGI=${fearGreed}，逆勢看多` });
            else if (fearGreed > 75) signals.push({ factor: "極度貪婪", direction: "bearish", weight: "high", detail: `FGI=${fearGreed}，過熱修正` });
            else signals.push({ factor: "情緒中性", direction: "neutral", weight: "low", detail: `FGI=${fearGreed}` });

            // 2. 資金費率 (合約燃料)
            const fundingScore = funding > 0.015 ? -20 : funding < 0 ? 20 : funding * -500;
            score += fundingScore;
            if (funding > 0.015) signals.push({ factor: "資金費率過高", direction: "bearish", weight: "high", detail: `${(funding * 100).toFixed(4)}%，空軍燃料` });
            else if (funding < 0) signals.push({ factor: "負資金費率", direction: "bullish", weight: "medium", detail: `${(funding * 100).toFixed(4)}%，軋空燃料` });
            else signals.push({ factor: "資金費率正常", direction: "neutral", weight: "low", detail: `${(funding * 100).toFixed(4)}%` });

            // 3. 多空比 (L/S Ratio)
            const lsScore = longShortRatio > 2 ? -20 : longShortRatio < 0.8 ? 15 : (1 - longShortRatio) * 15;
            score += lsScore;
            if (longShortRatio > 1.8) signals.push({ factor: "多空比偏高", direction: "bearish", weight: "high", detail: `散戶狂多 L/S=${longShortRatio.toFixed(2)}` });
            else if (longShortRatio < 0.9) signals.push({ factor: "空頭主導", direction: "bullish", weight: "medium", detail: `L/S=${longShortRatio.toFixed(2)}` });

            // 4. 宏觀防禦 (VIX & US10Y)
            if (vix > 25) { score -= 15; signals.push({ factor: "VIX 飆高避險", direction: "bearish", weight: "high", detail: `VIX=${vix.toFixed(1)}，防插針` }); }
            if (us10y > 4.5) { score -= 10; signals.push({ factor: "無風險利率過高", direction: "bearish", weight: "medium", detail: `10Y=${us10y.toFixed(2)}%，熱錢抽離` }); }

            score = Math.max(-100, Math.min(100, score));
            const direction = score > 15 ? "LONG" : score < -15 ? "SHORT" : "NEUTRAL";
            const conviction = Math.abs(score);

            // 動態盈虧比模型 (加入防刺穿思維)
            let winRate, avgWinPct, avgLossPct;
            if (direction === "LONG") {
                winRate = 0.45 + conviction * 0.003;
                avgWinPct = 3 + conviction * 0.05;
                avgLossPct = 2.5; // 寬幅防守
            } else if (direction === "SHORT") {
                winRate = 0.42 + conviction * 0.003;
                avgWinPct = 2.5 + conviction * 0.04;
                avgLossPct = 2.5;
            } else {
                winRate = 0.5; avgWinPct = 2; avgLossPct = 2;
            }
            winRate = Math.min(winRate, 0.72);

            return {
                score, direction, conviction, signals,
                kelly: {
                    full: kellyFraction(winRate, avgWinPct, avgLossPct),
                    half: halfKelly(winRate, avgWinPct, avgLossPct),
                    winRate, avgWin: avgWinPct, avgLoss: avgLossPct,
                    riskReward: (avgWinPct / avgLossPct).toFixed(2),
                },
            };
        }

        // ── 升級版：包含 Sanity Check 的 Real API Data Engine ───────────
        function useRealData() {
            const [data, setData] = useState(null);
            const [lastUpdate, setLastUpdate] = useState(null);
            const [isLoading, setIsLoading] = useState(true);

            // 使用 useRef 儲存上一次的「合理宏觀數據」，作為對比基準
            const lastValidMacro = useRef({
                vix: 18.5, sp500Change: 0, dxy: 104.2, us10y: 4.35, gold: 2350
            });
            // 記錄哪些指標出現異常
            const anomalyFlags = useRef({}); 

            const fetchMacroFromYahoo = async (symbol) => {
                try {
                    const yfUrl = `https://query1.finance.yahoo.com/v8/finance/chart/${symbol}?interval=1d&range=2d`;
                    const proxyUrl = `https://api.allorigins.win/raw?url=${encodeURIComponent(yfUrl)}`;
                    const res = await fetch(proxyUrl);
                    const json = await res.json();
                    const meta = json.chart.result[0].meta;
                    return {
                        price: meta.regularMarketPrice,
                        changePct: ((meta.regularMarketPrice - meta.chartPreviousClose) / meta.chartPreviousClose) * 100
                    };
                } catch (e) {
                    return null;
                }
            };

            // 核心 Sanity Check 函數 (偏離 > 10% 或極端異常值則阻擋)
            const checkSanity = (key, newVal, oldVal, absoluteMin, absoluteMax) => {
                if (newVal == null || isNaN(newVal)) {
                    anomalyFlags.current[key] = true;
                    return oldVal; // 抓取失敗用舊值
                }
                if (newVal < absoluteMin || newVal > absoluteMax) {
                    anomalyFlags.current[key] = true; // 觸發絕對值防呆
                    return oldVal;
                }
                const deviation = Math.abs(newVal - oldVal) / oldVal;
                if (deviation > 0.10) { // 偏離大於 10%
                    anomalyFlags.current[key] = true;
                    return oldVal; // 捨棄異常飆升/暴跌，保留上次正常值
                }
                anomalyFlags.current[key] = false; // 恢復正常
                return newVal;
            };

            const fetchData = useCallback(async () => {
                try {
                    // 1. 真實加密貨幣 API 請求
                    const [tickerRes, fundingRes, oiRes, lsRes, fngRes, deribitRes] = await Promise.allSettled([
                        fetch('https://fapi.binance.com/fapi/v1/ticker/24hr?symbol=BTCUSDT').then(r => r.json()),
                        fetch('https://fapi.binance.com/fapi/v1/premiumIndex?symbol=BTCUSDT').then(r => r.json()),
                        fetch('https://fapi.binance.com/fapi/v1/openInterest?symbol=BTCUSDT').then(r => r.json()),
                        fetch('https://fapi.binance.com/futures/data/globalLongShortAccountRatio?symbol=BTCUSDT&period=1d&limit=1').then(r => r.json()),
                        fetch('https://api.alternative.me/fng/').then(r => r.json()),
                        fetch('https://www.deribit.com/api/v2/public/get_book_summary_by_currency?currency=BTC&kind=option').then(r => r.json())
                    ]);

                    // 2. 宏觀數據 請求
                    const [vixRes, spxRes, dxyRes, us10yRes, goldRes] = await Promise.all([
                        fetchMacroFromYahoo('%5EVIX'),
                        fetchMacroFromYahoo('%5EGSPC'),
                        fetchMacroFromYahoo('DX-Y.NYB'),
                        fetchMacroFromYahoo('%5ETNX'),
                        fetchMacroFromYahoo('GC=F')
                    ]);

                    let btcPrice = 68000, priceChange24h = 0, volume24h = 0, funding = 0, openInterest = 0;
                    let longShortRatio = 1, fearGreed = 50, fearGreedLabel = "Neutral", pcr = 0;

                    // 解析幣圈數據
                    if (tickerRes.status === 'fulfilled' && tickerRes.value) {
                        btcPrice = parseFloat(tickerRes.value.lastPrice);
                        priceChange24h = parseFloat(tickerRes.value.priceChangePercent);
                        volume24h = parseFloat(tickerRes.value.quoteVolume) / 1e9;
                    }
                    if (fundingRes.status === 'fulfilled' && fundingRes.value) funding = parseFloat(fundingRes.value.lastFundingRate);
                    if (oiRes.status === 'fulfilled' && oiRes.value) openInterest = (parseFloat(oiRes.value.openInterest) * btcPrice) / 1e9;
                    if (lsRes.status === 'fulfilled' && lsRes.value && lsRes.value.length > 0) longShortRatio = parseFloat(lsRes.value[0].longShortRatio);
                    if (fngRes.status === 'fulfilled' && fngRes.value && fngRes.value.data) {
                        fearGreed = parseInt(fngRes.value.data[0].value);
                        fearGreedLabel = fngRes.value.data[0].value_classification;
                    }
                    if (deribitRes.status === 'fulfilled' && deribitRes.value && deribitRes.value.result) {
                        let callOI = 0, putOI = 0;
                        deribitRes.value.result.forEach(item => {
                            if(item.instrument_name.includes('-C')) callOI += item.open_interest;
                            if(item.instrument_name.includes('-P')) putOI += item.open_interest;
                        });
                        if (callOI > 0) pcr = putOI / callOI;
                    }

                    // 解析宏觀數據 (套用 Sanity Check)
                    const prev = lastValidMacro.current;
                    let newVix = vixRes ? vixRes.price : prev.vix;
                    let newSpx = spxRes ? spxRes.changePct : prev.sp500Change;
                    let newDxy = dxyRes ? dxyRes.price : prev.dxy;
                    let newUs10y = us10yRes ? (us10yRes.price / 10) : prev.us10y; // 處理 Yahoo TNX 放大 10 倍問題
                    let newGold = goldRes ? goldRes.price : prev.gold;

                    // 執行過濾 (防呆閾值設定)
                    const safeVix = checkSanity('vix', newVix, prev.vix, 9, 100);
                    // S&P changePct 可能會因為正負號跳動大，單獨處理，只擋極端值
                    let safeSpx = newSpx;
                    if (newSpx == null || isNaN(newSpx) || newSpx > 10 || newSpx < -10) {
                        anomalyFlags.current['sp500Change'] = true;
                        safeSpx = prev.sp500Change;
                    } else {
                        anomalyFlags.current['sp500Change'] = false;
                    }
                    const safeDxy = checkSanity('dxy', newDxy, prev.dxy, 80, 130);
                    const safeUs10y = checkSanity('us10y', newUs10y, prev.us10y, 1.0, 8.0);
                    const safeGold = checkSanity('gold', newGold, prev.gold, 1500, 3500);

                    // 更新記憶體
                    lastValidMacro.current = { vix: safeVix, sp500Change: safeSpx, dxy: safeDxy, us10y: safeUs10y, gold: safeGold };

                    const etfFlowDaily = (Math.random() - 0.3) * 300; 

                    setData({
                        btcPrice, priceChange24h, volume24h, fearGreed, fearGreedLabel, funding,
                        openInterest, longShortRatio, volatility: 2.5, btcDominance: 53.5, 
                        maxPain: Math.round(btcPrice / 1000) * 1000, 
                        vix: safeVix, sp500Change: safeSpx, dxy: safeDxy, us10y: safeUs10y, gold: safeGold, pcr, etfFlowDaily,
                        hashRate: 600, exchangeReserve: 2.1, etfFlowWeekly: etfFlowDaily * 4,
                        anomalies: { ...anomalyFlags.current } // 將異常狀態拷貝傳給 UI
                    });
                    
                    setLastUpdate(new Date());
                    setIsLoading(false);

                } catch (error) {
                    console.error("即時行情抓取錯誤:", error);
                }
            }, []);

            useEffect(() => {
                fetchData();
                const interval = setInterval(fetchData, 30000); 
                return () => clearInterval(interval);
            }, [fetchData]);

            return { data, lastUpdate, refresh: fetchData, isLoading };
        }

        // ── Components ───────────────────────────────────────────
        function Sparkline({ data, color = "#00ff88", width = 120, height = 32 }) {
            if (!data || data.length < 2) return null;
            const min = Math.min(...data);
            const max = Math.max(...data);
            const range = max - min || 1;
            const points = data.map((v, i) => `${(i / (data.length - 1)) * width},${height - ((v - min) / range) * height}`).join(" ");
            return (
                <svg width={width} height={height} style={{ display: "block" }}>
                    <polyline points={points} fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" />
                </svg>
            );
        }

        function ScoreGauge({ score, size = 180 }) {
            const normalized = (score + 100) / 200;
            const angle = -135 + normalized * 270;
            const color = score > 25 ? "#00ff88" : score > 0 ? "#88ffaa" : score > -25 ? "#ffaa00" : "#ff4444";
            const r = size * 0.38;
            const cx = size / 2, cy = size / 2;
            const rad = (angle * Math.PI) / 180;
            const nx = cx + r * Math.cos(rad), ny = cy + r * Math.sin(rad);

            return (
                <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`}>
                    <path d={describeArc(cx, cy, r, -135, 135)} fill="none" stroke="rgba(255,255,255,0.08)" strokeWidth={size * 0.06} strokeLinecap="round" />
                    <path d={describeArc(cx, cy, r, -135, angle)} fill="none" stroke={color} strokeWidth={size * 0.06} strokeLinecap="round" style={{ filter: `drop-shadow(0 0 6px ${color}80)` }} />
                    <circle cx={nx} cy={ny} r={size * 0.025} fill={color} style={{ filter: `drop-shadow(0 0 4px ${color})` }} />
                    <text x={cx} y={cy - 4} textAnchor="middle" fill="white" fontSize={size * 0.18} fontWeight="800">{score > 0 ? "+" : ""}{score.toFixed(0)}</text>
                    <text x={cx} y={cy + size * 0.12} textAnchor="middle" fill="rgba(255,255,255,0.5)" fontSize={size * 0.065}>COMPOSITE</text>
                    <text x={size * 0.12} y={cy + r + 16} textAnchor="middle" fill="#ff4444" fontSize={size * 0.05}>SHORT</text>
                    <text x={size * 0.88} y={cy + r + 16} textAnchor="middle" fill="#00ff88" fontSize={size * 0.05}>LONG</text>
                </svg>
            );
        }

        function describeArc(x, y, radius, startAngle, endAngle) {
            const start = polarToCartesian(x, y, radius, endAngle);
            const end = polarToCartesian(x, y, radius, startAngle);
            const largeArcFlag = endAngle - startAngle <= 180 ? "0" : "1";
            return `M ${start.x} ${start.y} A ${radius} ${radius} 0 ${largeArcFlag} 0 ${end.x} ${end.y}`;
        }

        function polarToCartesian(cx, cy, r, deg) {
            const rad = ((deg - 90) * Math.PI) / 180;
            return { x: cx + r * Math.cos(rad), y: cy + r * Math.sin(rad) };
        }

        function MetricChip({ label, value, note="" }) {
            return (
                <div style={styles.metricChip}>
                    <span style={styles.metricChipLabel}>{label}</span>
                    <span style={styles.metricChipValue}>{value} <span style={{fontSize:9, color:"#666"}}>{note}</span></span>
                </div>
            );
        }

        // ── 升級版 MacroTile (支援異常標黃示警) ───────────────────
        function MacroTile({ label, value, status, note="", isAnomaly=false }) {
            const color = isAnomaly ? "#F0B90B" : (status === "ok" ? "#00ff88" : status === "warn" ? "#ffaa00" : "#ff4444");
            const borderStyle = isAnomaly ? "1px dashed #F0B90B" : "1px solid #1a1a28";
            
            return (
                <div style={{ ...styles.macroTile, border: borderStyle }}>
                    <span style={{...styles.macroTileLabel, color: isAnomaly ? "#F0B90B" : "rgba(255,255,255,0.4)"}}>
                        {label} {isAnomaly && "⚠️"} {note && <span style={{fontSize:8,color:"#666"}}>{note}</span>}
                    </span>
                    <span style={{ ...styles.macroTileValue, color }}>
                        {value}
                    </span>
                    {isAnomaly && <span style={{fontSize:9, color:"#F0B90B"}}>Data Error Filtered</span>}
                </div>
            );
        }

        // ── Views ──────────────────────────────────────────────────
        function DashboardView({ data, analysis, sparkHistory }) {
            const dirColor = analysis.direction === "LONG" ? "#00ff88" : analysis.direction === "SHORT" ? "#ff4444" : "#ffaa00";
            return (
                <div style={styles.dashGrid}>
                    <div style={{ ...styles.card, alignItems: "center" }}>
                        <div style={styles.cardLabel}>AI 綜合評分</div>
                        <ScoreGauge score={analysis.score} size={200} />
                        <div style={{ ...styles.directionBadge, background: `${dirColor}18`, border: `1px solid ${dirColor}40` }}>
                            <span style={{ color: dirColor, fontWeight: 700, fontSize: 15 }}>{analysis.direction === "LONG" ? "做多傾向" : analysis.direction === "SHORT" ? "做空傾向" : "觀望"}</span>
                            <span style={{ color: "rgba(255,255,255,0.5)", fontSize: 11 }}>信心度 {analysis.conviction.toFixed(0)}%</span>
                        </div>
                    </div>
                    <div style={styles.card}>
                        <div style={styles.cardLabel}>BTC/USDT 永續 <span style={{color:"#00ff88", fontSize:10}}>LIVE</span></div>
                        <div style={styles.priceMain}>${data.btcPrice.toLocaleString("en", { maximumFractionDigits: 0 })}</div>
                        <div style={{ ...styles.priceChange, color: data.priceChange24h >= 0 ? "#00ff88" : "#ff4444" }}>
                            {data.priceChange24h >= 0 ? "▲" : "▼"} {Math.abs(data.priceChange24h).toFixed(2)}% (24h)
                        </div>
                        <div style={styles.priceMetrics}>
                            <MetricChip label="Vol 24h" value={`$${data.volume24h.toFixed(1)}B`} />
                            <MetricChip label="OI (合約)" value={`$${data.openInterest.toFixed(1)}B`} />
                            <MetricChip label="L/S 多空比" value={data.longShortRatio.toFixed(2)} />
                        </div>
                    </div>
                    <div style={styles.card}>
                        <div style={styles.cardLabel}>Fear & Greed Index <span style={{color:"#00ff88", fontSize:10}}>LIVE</span></div>
                        <div style={styles.fgiContainer}>
                            <div style={styles.fgiNumber}>{data.fearGreed}</div>
                            <div style={styles.fgiLabel}>{data.fearGreedLabel}</div>
                            <Sparkline data={sparkHistory} color={data.fearGreed < 30 ? "#ff4444" : data.fearGreed > 70 ? "#00ff88" : "#ffaa00"} width={120} height={32} />
                        </div>
                    </div>
                    <div style={styles.card}>
                        <div style={styles.cardLabel}>Kelly 建議倉位 (已套用保守防禦)</div>
                        <div style={styles.kellyQuick}>
                            <div>
                                <span style={styles.kellyQuickLabel}>Full Kelly</span>
                                <span style={styles.kellyQuickValue}>{(analysis.kelly.full * 100).toFixed(1)}%</span>
                            </div>
                            <div style={styles.kellyDivider} />
                            <div>
                                <span style={styles.kellyQuickLabel}>Half Kelly ★</span>
                                <span style={{ ...styles.kellyQuickValue, color: "#00ff88" }}>{(analysis.kelly.half * 100).toFixed(1)}%</span>
                            </div>
                        </div>
                        <div style={styles.kellyNote}>WR: {(analysis.kelly.winRate * 100).toFixed(1)}% · R/R: {analysis.kelly.riskReward} <br/> <span style={{color:"#ffaa00"}}>*嚴格執行止損，避免成為流動性</span></div>
                    </div>
                    <div style={{ ...styles.card, gridColumn: "1 / -1" }}>
                        <div style={styles.cardLabel}>多因子即時信號</div>
                        <div style={styles.signalGrid}>
                            {analysis.signals.map((s, i) => (
                                <div key={i} style={styles.signalRow}>
                                    <span style={{ ...styles.signalDot, background: s.direction === "bullish" ? "#00ff88" : s.direction === "bearish" ? "#ff4444" : "#666" }} />
                                    <span style={styles.signalFactor}>{s.factor}</span>
                                    <span style={styles.signalDetail}>{s.detail}</span>
                                    <span style={{ ...styles.signalWeight, color: s.weight === "high" ? "#fff" : s.weight === "medium" ? "rgba(255,255,255,0.6)" : "rgba(255,255,255,0.3)" }}>{s.weight.toUpperCase()}</span>
                                </div>
                            ))}
                        </div>
                    </div>
                    <div style={{ ...styles.card, gridColumn: "1 / -1" }}>
                        <div style={styles.cardLabel}>宏觀速覽</div>
                        <div style={styles.macroQuickGrid}>
                            <MacroTile label="資金費率" value={`${(data.funding * 100).toFixed(4)}%`} status={data.funding > 0.015 ? "danger" : data.funding < 0 ? "warn" : "ok"} note="(Binance)" />
                            <MacroTile label="Deribit PCR" value={data.pcr.toFixed(2)} status={data.pcr > 0.9 ? "warn" : "ok"} note="(Deribit)"/>
                            <MacroTile label="VIX" value={data.vix.toFixed(1)} status={data.vix > 25 ? "danger" : data.vix > 18 ? "warn" : "ok"} note="(YF API)" isAnomaly={data.anomalies?.vix}/>
                            <MacroTile label="S&P 500" value={`${data.sp500Change > 0 ? "+" : ""}${data.sp500Change.toFixed(2)}%`} status={data.sp500Change > 0 ? "ok" : "danger"} note="(YF API)" isAnomaly={data.anomalies?.sp500Change}/>
                            <MacroTile label="DXY" value={data.dxy.toFixed(1)} status={data.dxy > 105 ? "danger" : "ok"} note="(YF API)" isAnomaly={data.anomalies?.dxy}/>
                            <MacroTile label="US10Y" value={`${data.us10y.toFixed(2)}%`} status={data.us10y > 4.5 ? "danger" : "ok"} note="(YF API)" isAnomaly={data.anomalies?.us10y}/>
                            <MacroTile label="Gold" value={`$${data.gold.toFixed(0)}`} status="ok" note="(YF API)" isAnomaly={data.anomalies?.gold}/>
                            <MacroTile label="ETF 日流" value={`${data.etfFlowDaily > 0 ? "+" : ""}$${(data.etfFlowDaily).toFixed(0)}M`} status={data.etfFlowDaily > 0 ? "ok" : "danger"} note="(Sim)"/>
                        </div>
                    </div>
                </div>
            );
        }

        function MacroMatrixView({ data }) {
            const factors = [
                { id: 1, name: "衍生品結構 (REAL)", desc: "幣安與Deribit即時數據", metrics: [{ label: "資金費率", value: `${(data.funding * 100).toFixed(4)}%` }, { label: "PCR", value: data.pcr.toFixed(2) }, { label: "大戶多空比", value: data.longShortRatio.toFixed(2)}], signal: data.funding < 0 || data.pcr > 1 ? "bullish" : data.funding > 0.02 ? "bearish" : "neutral" },
                { id: 2, name: "美股相關性 (Yahoo Proxy)", desc: "VIX防禦與大盤連動", metrics: [{ label: "VIX 恐慌指數", value: data.vix.toFixed(1) }, { label: "S&P 500", value: `${data.sp500Change > 0 ? "+" : ""}${data.sp500Change.toFixed(2)}%` }], signal: data.sp500Change > 0 && data.vix < 22 ? "bullish" : data.vix > 28 ? "bearish" : "neutral" },
                { id: 3, name: "風險溢價 (Yahoo Proxy)", desc: "熱錢與避險屬性", metrics: [{ label: "Gold", value: `$${data.gold.toFixed(0)}` }, { label: "DXY", value: data.dxy.toFixed(1) }, { label: "US10Y", value: `${data.us10y.toFixed(2)}%` }], signal: data.dxy < 103 ? "bullish" : data.dxy > 105 ? "bearish" : "neutral" },
            ];
            return (
                <div>
                    <div style={styles.factorList}>
                        {factors.map(f => (
                            <div key={f.id} style={styles.factorCard}>
                                <div style={styles.factorHeader}>
                                    <div style={styles.factorIdBadge}>F{f.id}</div>
                                    <div style={{ flex: 1 }}>
                                        <div style={styles.factorName}>{f.name}</div>
                                        <div style={styles.factorDesc}>{f.desc}</div>
                                    </div>
                                    <span style={{ ...styles.factorSignalBadge, color: f.signal === "bullish" ? "#00ff88" : f.signal === "bearish" ? "#ff4444" : "#ffaa00", borderColor: f.signal === "bullish" ? "#00ff88" : f.signal === "bearish" ? "#ff4444" : "#ffaa00" }}>{f.signal.toUpperCase()}</span>
                                </div>
                                <div style={styles.factorMetrics}>
                                    {f.metrics.map((m, i) => <MetricChip key={i} label={m.label} value={m.value} />)}
                                </div>
                            </div>
                        ))}
                    </div>
                </div>
            );
        }

        function KellyEngineView({ analysis, data }) {
            const k = analysis.kelly;
            const balance = 10000;
            const leverage = 5;
            const positionSize = balance * k.half;
            const notional = positionSize * leverage;
            return (
                <div>
                    <div style={styles.formulaCard}>
                        <div style={styles.formulaHeader}>
                            <span style={styles.formulaTitle}>Kelly Criterion Formula</span>
                        </div>
                        <div style={styles.formulaBody}>f* = (b·p − q) / b</div>
                        <div style={styles.formulaVars}>b = 盈虧比({k.riskReward}) · p = 勝率({(k.winRate * 100).toFixed(1)}%) · q = 賠率({((1 - k.winRate) * 100).toFixed(1)}%)</div>
                    </div>
                    <div style={styles.kellyResultGrid}>
                        <div style={styles.kellyResultCard}><div style={styles.kellyResultLabel}>Full Kelly</div><div style={styles.kellyResultValue}>{(k.full * 100).toFixed(2)}%</div></div>
                        <div style={{ ...styles.kellyResultCard, borderColor: "#00ff8840" }}><div style={styles.kellyResultLabel}>Half Kelly ★</div><div style={{ ...styles.kellyResultValue, color: "#00ff88" }}>{(k.half * 100).toFixed(2)}%</div></div>
                    </div>
                    <div style={styles.sizingCard}>
                        <div style={styles.cardLabel}>實戰倉位試算 (示例帳戶 $10,000)</div>
                        <div style={styles.sizingGrid}>
                            <div style={styles.sizingItem}><span style={styles.sizingLabel}>方向</span><span style={{ ...styles.sizingValue, color: analysis.direction === "LONG" ? "#00ff88" : "#ff4444" }}>{analysis.direction}</span></div>
                            <div style={styles.sizingItem}><span style={styles.sizingLabel}>保證金 (Half Kelly)</span><span style={styles.sizingValue}>${positionSize.toFixed(0)}</span></div>
                            <div style={styles.sizingItem}><span style={styles.sizingLabel}>槓桿</span><span style={styles.sizingValue}>{leverage}X</span></div>
                            <div style={styles.sizingItem}><span style={styles.sizingLabel}>最大虧損 (帳戶%)</span><span style={{ ...styles.sizingValue, color: "#ff4444" }}>{(k.half * (k.avgLoss / 100) * leverage * 100).toFixed(1)}%</span></div>
                        </div>
                    </div>
                </div>
            );
        }

        // ── Main App Component ───────────────────────────────────────────
        function BTCMacroKellyApp() {
            const { data, lastUpdate, refresh, isLoading } = useRealData();
            const [activeTab, setActiveTab] = useState("dashboard");

            // 當 FGI 數據更新時，動態推進折線圖

            if (isLoading || !data) {

            const analysis = generateAIAnalysis(data);
            const tabs = [{ id: "dashboard", label: "即時總覽" }, { id: "macro", label: "宏觀矩陣" }, { id: "kelly", label: "Kelly 引擎" }];

            return (
                <div style={styles.app}>

                    </header>
                    <nav style={styles.nav}>
                        {tabs.map((t) => (
                            <button key={t.id} onClick={() => setActiveTab(t.id)} style={{ ...styles.navBtn, ...(activeTab === t.id ? styles.navBtnActive : {}) }}>{t.label}</button>
                        ))}
                    </nav>
                    <main style={styles.main}>
                        {activeTab === "dashboard" && <DashboardView data={data} analysis={analysis} sparkHistory={sparkHistory} />}
                        {activeTab === "macro" && <MacroMatrixView data={data} />}
                        {activeTab === "kelly" && <KellyEngineView analysis={analysis} data={data} />}
                    </main>
                    <footer style={styles.footer}><span>⚠ 本工具連接幣安合約、Deribit與 FGI 真實數據，宏觀數據經代理節點抓取。所有分析應配合嚴格防禦止損。</span></footer>
                </div>

        }
