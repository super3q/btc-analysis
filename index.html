function AlertBox({ type, msg }) {
const colors = { danger: [T.red, “#FCA5A5”], warning: [T.yellow, “#FDE68A”], ok: [T.green, “#6EE7B7”] };
const [bg, fg] = colors[type] || [T.muted, T.text];
return (
<div style={{ borderRadius: 8, padding: “8px 12px”, marginBottom: 6, fontSize: 12, display: “flex”, alignItems: “center”, gap: 8, background: `${bg}15`, border: `1px solid ${bg}44`, color: fg }}>
{msg}
</div>
);
}

// 每次收到新截圖，只需更新頂部的 ALL_ORDERS 陣列即可
function OrdersScreen({ state, pos }) {
const p = state.price;
const [filter, setFilter] = useState(“全部”);
const filters = [“全部”, “開空”, “平空”, “開多”, “平多”];

const displayed = filter === “全部” ? ALL_ORDERS : ALL_ORDERS.filter(o => o.dir === filter);

// Sort by price desc so you can see the ladder
const sorted = […displayed].sort((a, b) => b.price - a.price);

// Distance from current price
const dist = (price) => {
if (!p) return null;
return ((price - p) / p * 100);
};

// Color by direction
const dirColor = dir => {
if (dir === “開空”) return “#EF4444”;
if (dir === “平空”) return “#10B981”;
if (dir === “開多”) return “#10B981”;
if (dir === “平多”) return “#EF4444”;
return T.muted;
};
const dirBg = dir => `${dirColor(dir)}12`;

// Which orders are “near” (within 2%)
const isNear = (price) => p ? Math.abs((price - p) / p) < 0.02 : false;

return (
<div style={{ padding: “0 12px 80px” }}>
<TopBar
title=“條件單總覽”
sub={`📸 截圖更新：2026-03-09 07:44 · 共 ${ALL_ORDERS.length} 筆`}
/>

const SLabel = ({ children }) => <div style={{ fontSize: 10, color: T.blue, fontWeight: 600, letterSpacing: “1px”, marginBottom: 8, borderBottom: `1px solid rgba(99,102,241,0.2)`, paddingBottom: 4 }}>{children}</div>;

// ─── Factor Builder ───────────────────────────────────────────
function getFactors(state, pos) {
const ch = state.change24h;
const fr = state.fundingRate;
return [
{
num: 1, title: “風險資產動能”,
sig: ch === null ? “載入中” : ch < -3 ? “偏空” : ch > 3 ? “偏多” : “中性”,
val: ch !== null ? `${ch > 0 ? "+" : ""}${ch.toFixed(2)}%` : “—”,
det: ch !== null ? `24h ${ch > 0 ? "+" : ""}${ch.toFixed(2)}% · S&P相關0.55` : “”,
},
{ num: 2, title: “ETF資金流”,    sig: pos.f2sig, val: pos.f2sig, det: pos.f2note },
{ num: 3, title: “地緣政治”,     sig: pos.f3sig, val: pos.f3sig, det: pos.f3note },
{
num: 4, title: “衍生品結構”,
sig: fr === null ? “載入中” : fr < -0.005 ? “偏多” : fr < 0 ? “偏多” : fr > 0.01 ? “偏空” : “中性”,
val: fr !== null ? `${(fr * 100).toFixed(4)}%` : “—”,
det: fr !== null ? `費率 ${(fr * 100).toFixed(4)}% ${fr < 0 ? "· 空頭付費" : "· 多頭付費"}` : “”,
},
{ num: 5, title: “鏈上行為”,     sig: pos.f5sig, val: pos.f5sig, det: pos.f5note },
];
}

// ─── Bottom Nav ───────────────────────────────────────────────
const NAV = [
{ id: “overview”,  icon: “⊙”,  label: “總覽” },
{ id: “chart”,     icon: “📈”, label: “圖表” },
{ id: “whale”,     icon: “🐋”, label: “籌碼” },
{ id: “position”,  icon: “🎯”, label: “倉位” },
{ id: “orders”,    icon: “📋”, label: “掛單” },
];

// ─── Main App ─────────────────────────────────────────────────
function App() {
const [nav, setNav] = useState(“overview”);
const [pos, setPos] = useState(loadPOS());
const [showSettings, setShowSettings] = useState(false);

// Market state
const [mkt, setMkt] = useState({
price: null, change24h: null, vol24h: null,
rsi14: null, atr14: null, ma50: null, ma200: null,
fundingRate: null, oi: null, fearGreed: null,
wsConnected: false, lastUpdate: null,
});
const [obData, setObData]     = useState({ buyPct: 50, sellPct: 50, bidWall: null, askWall: null });
const [pivots, setPivots]     = useState({});
const [deribit, setDeribit]   = useState({ pcr: null, status: “讀取中…”, style: {} });
const [funding, setFunding]   = useState({ rate: null, rateCol: T.white, status: “加載中…”, statusStyle: {}, countdown: null, history: [] });

// ── WebSocket ──────────────────────────────────────────────
useEffect(() => {
let ws;
const connect = () => {
try {
ws = new WebSocket(“wss://stream.binance.com:9443/ws/btcusdt@ticker”);
ws.onopen  = () => setMkt(m => ({ …m, wsConnected: true }));
ws.onmessage = e => {
const d = JSON.parse(e.data);
setMkt(m => ({ …m, price: parseFloat(d.c), change24h: parseFloat(d.P), vol24h: parseFloat(d.q) }));
};
ws.onerror = ws.onclose = () => { setMkt(m => ({ …m, wsConnected: false })); setTimeout(connect, 5000); };
} catch { setTimeout(connect, 10000); }
};
connect();
return () => ws?.close();
}, []);

// ── REST polling ──────────────────────────────────────────
const fetchREST = useCallback(async () => {
// Klines for RSI / ATR / MA
try {
const r = await fetch(“https://api.binance.com/api/v3/klines?symbol=BTCUSDT&interval=1d&limit=201”);
const k = await r.json();
if (Array.isArray(k) && k.length > 50) {
const c = k.map(x => +x[4]);
// RSI
let g = 0, l = 0;
for (let i = 1; i <= 14; i++) { const d = c[c.length - 15 + i] - c[c.length - 15 + i - 1]; if (d > 0) g += d; else l -= d; }
const ag = g / 14, al = l / 14;
const rsi = al === 0 ? 100 : 100 - 100 / (1 + ag / al);
// ATR
let atrSum = 0;
for (let i = k.length - 14; i < k.length; i++) {
const h = +k[i][2], lo = +k[i][3], pc = +k[i - 1][4];
atrSum += Math.max(h - lo, Math.abs(h - pc), Math.abs(lo - pc));
}
const atr = atrSum / 14;
const ma50 = c.slice(-50).reduce((a, b) => a + b, 0) / 50;
const ma200 = c.length >= 200 ? c.slice(-200).reduce((a, b) => a + b, 0) / 200 : null;
setMkt(m => ({ …m, rsi14: rsi, atr14: atr, ma50, ma200, lastUpdate: new Date() }));
}
} catch {}
// Funding
try {
const r = await fetch(“https://fapi.binance.com/fapi/v1/fundingRate?symbol=BTCUSDT&limit=1”);
const d = await r.json();
if (Array.isArray(d) && d[0]) setMkt(m => ({ …m, fundingRate: parseFloat(d[0].fundingRate) }));
} catch {}
// OI
try {
const r = await fetch(“https://fapi.binance.com/fapi/v1/openInterest?symbol=BTCUSDT”);
const d = await r.json();
if (d.openInterest) setMkt(m => ({ …m, oi: parseFloat(d.openInterest) }));
} catch {}
// Fear & Greed
try {
const r = await fetch(“https://api.alternative.me/fng/?limit=1”);
const d = await r.json();
if (d?.data?.[0]) setMkt(m => ({ …m, fearGreed: parseInt(d.data[0].value) }));
} catch {}
}, []);

const fetchWhaleData = useCallback(async () => {
// Order Book
try {
const r = await fetch(“https://fapi.binance.com/fapi/v1/depth?symbol=BTCUSDT&limit=500”);
const d = await r.json();
let b = d.bids.slice(0, 50).reduce((a, v) => a + parseFloat(v[1]), 0);
let s = d.asks.slice(0, 50).reduce((a, v) => a + parseFloat(v[1]), 0);
const t = b + s;
let mB = { price: 0, vol: 0 }, mA = { price: 0, vol: 0 };
d.bids.forEach(v => { const vol = parseFloat(v[1]); if (vol > mB.vol) { mB = { price: parseFloat(v[0]), vol }; } });
d.asks.forEach(v => { const vol = parseFloat(v[1]); if (vol > mA.vol) { mA = { price: parseFloat(v[0]), vol }; } });
setObData({ buyPct: b / t * 100, sellPct: s / t * 100, bidWall: mB, askWall: mA });
} catch {}
// Pivots
try {
const r = await fetch(“https://fapi.binance.com/fapi/v1/klines?symbol=BTCUSDT&interval=4h&limit=150”);
const d = await r.json();
const ph = parseFloat(d[d.length - 2][2]), pl = parseFloat(d[d.length - 2][3]), pc = parseFloat(d[d.length - 2][4]);
const pp = (ph + pl + pc) / 3;
setPivots({ p: pp, r1: 2 * pp - pl, r2: pp + (ph - pl), s1: 2 * pp - ph, s2: pp - (ph - pl) });
} catch {}
// Deribit
try {
const r = await fetch(“https://deribit.com/api/v2/public/get_book_summary_by_currency?currency=BTC&kind=option”);
const d = await r.json();
if (d?.result) {
let cOI = 0, pOI = 0;
d.result.forEach(i => { if (i.instrument_name.includes(”-C”)) cOI += i.open_interest; if (i.instrument_name.includes(”-P”)) pOI += i.open_interest; });
if (cOI > 0) {
const pcr = pOI / cOI;
setDeribit({
pcr: pcr.toFixed(2),
status: pcr > 1 ? “🐻 極度看空(軋空燃料)” : pcr < 0.6 ? “🐂 極度貪婪(下殺燃料)” : “⚖️ 多空平衡”,
style: pcr > 1 ? { background: “rgba(14,203,129,0.1)”, color: T.green, border: `1px solid ${T.green}` } :
pcr < 0.6 ? { background: “rgba(239,68,68,0.1)”, color: T.red, border: `1px solid ${T.red}` } :
{ background: “rgba(240,185,11,0.1)”, color: T.yellow, border: `1px solid ${T.yellow}` },
});
}
}
} catch {}
// Funding detail
try {
const r = await fetch(“https://fapi.binance.com/fapi/v1/premiumIndex?symbol=BTCUSDT”);
const d = await r.json();
const rate = parseFloat(d.lastFundingRate) * 100;
const rateCol = rate > 0.015 ? T.red : rate < 0 ? T.green : T.yellow;
const status = rate > 0.015 ? “🔥 極度貪婪” : rate < 0 ? “😨 恐慌負費率” : “⚖️ 中性”;
const statusStyle = rate > 0.015 ? { background: “rgba(239,68,68,0.15)”, border: `1px solid rgba(239,68,68,0.5)`, color: T.red } :
rate < 0     ? { background: “rgba(16,185,129,0.15)”, border: `1px solid rgba(16,185,129,0.5)`, color: T.green } :
{ background: “rgba(245,158,11,0.15)”, border: `1px solid rgba(245,158,11,0.5)`, color: T.yellow };
// History
const hr = await fetch(“https://fapi.binance.com/fapi/v1/fundingRate?symbol=BTCUSDT&limit=3”);
const hd = await hr.json();
const history = hd.reverse().map(x => {
const rv = (parseFloat(x.fundingRate) * 100).toFixed(4);
return { time: new Date(x.fundingTime).toLocaleString(“zh-TW”, { month: “numeric”, day: “numeric”, hour: “2-digit”, minute: “2-digit” }), rate: rv + “%”, col: rv > 0.015 ? T.red : rv < 0 ? T.green : T.yellow };
});
// Countdown
const nt = parseInt(d.nextFundingTime);
const diff = nt - Date.now();
const h = Math.floor(diff / 3600000), m = Math.floor((diff % 3600000) / 60000), s = Math.floor((diff % 60000) / 1000);
setFunding({ rate: rate.toFixed(4) + “%”, rateCol, status, statusStyle, countdown: `下次: ${String(h).padStart(2,"0")}:${String(m).padStart(2,"0")}:${String(s).padStart(2,"0")}`, history });
} catch {}
}, []);

useEffect(() => {
fetchREST();
fetchWhaleData();
const t1 = setInterval(fetchREST, 30000);
const t2 = setInterval(fetchWhaleData, 60000);
return () => { clearInterval(t1); clearInterval(t2); };
}, [fetchREST, fetchWhaleData]);

const savePos = useCallback(p => {
setPos(p);
try { localStorage.setItem(“btc_pos5”, JSON.stringify(p)); } catch {}
setShowSettings(false);
}, []);

const p = mkt.price;
const ch = mkt.change24h;

return (
<div style={{ background: T.bg, minHeight: “100dvh”, color: T.text, maxWidth: 520, margin: “0 auto”, fontFamily: “-apple-system, ‘SF Pro Display’, sans-serif”, position: “relative” }}>

```
  {/* Sticky price header */}
  <div style={{ position: "sticky", top: 0, zIndex: 100, background: "rgba(8,12,20,0.95)", backdropFilter: "blur(12px)", borderBottom: `1px solid ${T.border}`, padding: "8px 14px 6px", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
    <div>
      <div style={{ fontSize: 9, color: T.muted, letterSpacing: "2px" }}>BTC 五因子量化終端</div>
      <div style={{ fontSize: 26, fontWeight: 800, color: ch < 0 ? T.red : T.green, fontFamily: "monospace", lineHeight: 1.2 }}>
        {p ? `$${p.toLocaleString(undefined, { maximumFractionDigits: 0 })}` : "連線中..."}
      </div>
      {ch !== null && <div style={{ fontSize: 11, fontFamily: "monospace", color: ch >= 0 ? T.green : T.red }}>{ch >= 0 ? "+" : ""}{ch.toFixed(2)}%</div>}
    </div>
    <div style={{ textAlign: "right" }}>
      <div style={{ fontSize: 10, color: mkt.wsConnected ? T.green : T.red, display: "flex", alignItems: "center", gap: 4, justifyContent: "flex-end" }}>
        <span style={{ width: 7, height: 7, borderRadius: "50%", background: mkt.wsConnected ? T.green : T.red, display: "inline-block", boxShadow: mkt.wsConnected ? `0 0 6px ${T.green}88` : "none" }} />
        {mkt.wsConnected ? "即時" : "離線"}
      </div>
      {mkt.lastUpdate && <div style={{ fontSize: 9, color: T.muted, marginTop: 2 }}>REST: {mkt.lastUpdate.toLocaleTimeString()}</div>}
      <button onClick={() => setShowSettings(true)} style={{ marginTop: 4, background: "rgba(99,102,241,0.12)", border: "1px solid rgba(99,102,241,0.25)", color: "#A5B4FC", padding: "4px 10px", borderRadius: 6, fontSize: 11, cursor: "pointer", fontFamily: "inherit" }}>⚙</button>
    </div>
  </div>

  {/* Screen content */}
  <div style={{ minHeight: "calc(100dvh - 56px - 48px)", overflowY: "auto" }}>
    {nav === "overview"  && <OverviewScreen state={mkt} pos={pos} />}
    {nav === "chart"     && <ChartScreen state={mkt} />}
    {nav === "whale"     && <WhaleScreen state={mkt} obData={obData} pivots={pivots} deribit={deribit} funding={funding} />}
    {nav === "position"  && <PositionScreen state={mkt} pos={pos} onEdit={() => setShowSettings(true)} />}
    {nav === "orders"    && <OrdersScreen state={mkt} pos={pos} />}
  </div>

  {/* Bottom Nav */}
  <div style={{ position: "fixed", bottom: 0, left: "50%", transform: "translateX(-50%)", width: "100%", maxWidth: 520, background: "rgba(8,12,20,0.97)", borderTop: `1px solid ${T.border}`, display: "flex", justifyContent: "space-around", alignItems: "center", height: 56, zIndex: 200, backdropFilter: "blur(20px)" }}>
    {NAV.map(n => (
      <button key={n.id} onClick={() => setNav(n.id)} style={{ flex: 1, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", gap: 2, background: "none", border: "none", cursor: "pointer", padding: "6px 0" }}>
        <span style={{ fontSize: 20, lineHeight: 1 }}>{n.icon}</span>
        <span style={{ fontSize: 9, color: nav === n.id ? T.teal ?? "#00D4BC" : T.muted, fontWeight: nav === n.id ? 700 : 400 }}>{n.label}</span>
        {nav === n.id && <div style={{ width: 20, height: 2, background: "#00D4BC", borderRadius: 1 }} />}
      </button>
    ))}
  </div>

  {/* Settings Panel */}
  {showSettings && <SettingsPanel pos={pos} onSave={savePos} onClose={() => setShowSettings(false)} />}
</div>
```

);
}

const root = ReactDOM.createRoot(document.getElementById(‘root’));
root.render(React.createElement(App));
</script>
